<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>슈냥 업무 대시보드</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Pretendard',sans-serif;

background:
linear-gradient(
135deg,
#eef4ff 0%,
#f7faff 45%,
#ffffff 100%
);

padding:40px;

min-height:100vh;

color:#1e293b;

}

h1{

font-size:42px;
font-weight:800;

margin-bottom:8px;

}

.subtitle{

color:#64748b;

margin-bottom:28px;

}

.container{

display:grid;

grid-template-columns:1.2fr 0.8fr;

gap:24px;

}

.panel{

background:rgba(255,255,255,0.78);

backdrop-filter:blur(18px);

border-radius:28px;

padding:28px;

box-shadow:
0 8px 30px rgba(59,130,246,0.08);

}

.section-title{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:22px;

}

.section-title h2{

font-size:26px;
font-weight:800;

}

.history-btn{

border:none;

background:
linear-gradient(
135deg,
#4f46e5,
#6366f1
);

color:white;

padding:12px 18px;

border-radius:14px;

cursor:pointer;

font-weight:700;

}

.input-wrap{

display:flex;

gap:12px;

flex-wrap:wrap;

margin-bottom:18px;

}

input,
select,
textarea{

border:none;

outline:none;

background:#f1f5f9;

padding:15px;

border-radius:16px;

font-size:14px;

font-family:'Pretendard',sans-serif;

}

.main-input{

flex:1;

}

.add-btn{

border:none;

background:
linear-gradient(
135deg,
#4f46e5,
#6366f1
);

color:white;

height:52px;

padding:0 24px;

border-radius:16px;

cursor:pointer;

font-weight:700;

}

.task{

background:white;

border:1px solid #e2e8f0;

border-radius:22px;

padding:20px;

margin-bottom:16px;

box-shadow:
0 4px 14px rgba(15,23,42,0.04);

}

.task.done{

opacity:0.75;

background:#f8fafc;

}

.task-title{

font-size:17px;

font-weight:700;

line-height:1.6;

}

.task-title.done{

text-decoration:line-through;

color:#64748b;

}

.badge{

display:inline-block;

margin-top:12px;

padding:7px 12px;

border-radius:999px;

font-size:12px;

font-weight:700;

}

.high{
background:#fee2e2;
color:#dc2626;
}

.medium{
background:#fef3c7;
color:#d97706;
}

.low{
background:#dbeafe;
color:#2563eb;
}

.detail{

background:#f8fafc;

padding:12px;

border-radius:14px;

margin-top:10px;

}

.detail.done{

text-decoration:line-through;

opacity:0.6;

}

.detail-input-wrap{

display:flex;

gap:10px;

margin-top:14px;

}

.delete-btn{

border:none;

background:#e2e8f0;

padding:8px 12px;

border-radius:12px;

cursor:pointer;

font-size:12px;

font-weight:700;

}

.complete-title{

margin-top:28px;

margin-bottom:16px;

font-size:24px;

font-weight:800;

}

.progress-bar{

width:100%;

height:16px;

background:#dbeafe;

border-radius:999px;

overflow:hidden;

margin-top:12px;

}

.progress-fill{

height:100%;

width:0%;

background:
linear-gradient(
90deg,
#4f46e5,
#60a5fa
);

transition:0.3s;

}

.memo{

background:white;

border:1px solid #e2e8f0;

border-radius:22px;

padding:20px;

margin-bottom:16px;

position:relative;

}

.memo-delete{

position:absolute;

top:12px;
right:12px;

width:28px;
height:28px;

border:none;

border-radius:50%;

background:#111827;

color:white;

cursor:pointer;

}

.memo-type{

display:inline-block;

background:#eef2ff;

color:#4338ca;

padding:6px 12px;

border-radius:999px;

font-size:12px;

font-weight:700;

margin-bottom:12px;

}

.memo-title{

font-size:16px;

font-weight:700;

margin-bottom:10px;

}

.memo-content{

line-height:1.6;

white-space:pre-wrap;

}

@media(max-width:1200px){

.container{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<h1>
슈냥 업무 대시보드 ✨
</h1>

<div class="subtitle">
오늘도 효율적으로 정리중
</div>

<div class="container">

<div class="panel">

<div class="section-title">

<h2>💼 오늘의 업무</h2>

</div>

<div class="input-wrap">

<input
id="taskInput"
class="main-input"
placeholder="업무 입력..."
>

<select id="priorityInput">

<option value="high">🔥 높음</option>
<option value="medium">✨ 보통</option>
<option value="low">☁️ 낮음</option>

</select>

<button
class="add-btn"
onclick="addTask()">

추가

</button>

</div>

<div id="taskList"></div>

<div class="complete-title">
✅ 완료한 업무
</div>

<div id="doneTaskList"></div>

</div>

<div>

<div class="panel">

<h2 style="margin-bottom:14px;">
📈 진행률
</h2>

<div id="percent">
0%
</div>

<div class="progress-bar">

<div
id="progressFill"
class="progress-fill">
</div>

</div>

</div>

<br>

<div class="panel">

<h2 style="margin-bottom:18px;">
💌 요청 메모
</h2>

<div class="input-wrap">

<select id="memoType">

<option value="카톡">💬 카톡</option>
<option value="메신저">🖥️ 메신저</option>
<option value="전화">☎️ 전화</option>

</select>

<input
id="memoTitle"
class="main-input"
placeholder="제목 입력..."
>

</div>

<textarea
id="memoText"
rows="5"
placeholder="내용 입력..."
></textarea>

<br><br>

<button
class="add-btn"
onclick="addMemo()">

포스트잇 추가

</button>

<br><br>

<div id="memoWrap"></div>

</div>

</div>

</div>

<script>

let tasks =
JSON.parse(localStorage.getItem("tasks")) || [];

let memos =
JSON.parse(localStorage.getItem("memos")) || [];

function saveData(){

localStorage.setItem(
"tasks",
JSON.stringify(tasks)
);

localStorage.setItem(
"memos",
JSON.stringify(memos)
);

}

function createId(){

return Date.now().toString(36)
+
Math.random().toString(36).slice(2);

}

function addTask(){

const text =
document.getElementById("taskInput")
.value
.trim();

const priority =
document.getElementById("priorityInput")
.value;

if(!text) return;

tasks.unshift({

id:createId(),
text,
priority,
done:false,
details:[]

});

document.getElementById("taskInput").value="";

saveData();

renderAll();

}

function addDetail(taskId){

const input =
document.getElementById(
`detail-input-${taskId}`
);

const value =
input.value.trim();

if(!value) return;

const task =
tasks.find(
t=>t.id===taskId
);

task.details.push({

id:createId(),
text:value,
done:false

});

saveData();

renderAll();

}

function toggleTask(taskId){

const task =
tasks.find(
t=>t.id===taskId
);

task.done = !task.done;

saveData();

renderAll();

}

function toggleDetail(taskId,detailId){

const task =
tasks.find(
t=>t.id===taskId
);

const detail =
task.details.find(
d=>d.id===detailId
);

detail.done = !detail.done;

saveData();

renderAll();

}

function deleteTask(taskId){

tasks =
tasks.filter(
t=>t.id!==taskId
);

saveData();

renderAll();

}

function renderTasks(){

const taskList =
document.getElementById("taskList");

const doneList =
document.getElementById("doneTaskList");

taskList.innerHTML="";
doneList.innerHTML="";

tasks.forEach(task=>{

const div =
document.createElement("div");

div.className=
`task ${task.done?"done":""}`;

div.innerHTML=`

<div style="display:flex;gap:12px;">

<input
type="checkbox"
${task.done?"checked":""}
>

<div style="flex:1;">

<div style="
display:flex;
justify-content:space-between;
align-items:center;
">

<div class="
task-title
${task.done?"done":""}
">

${task.text}

</div>

<button class="delete-btn">
삭제
</button>

</div>

<div class="badge ${task.priority}">
${task.priority==="high"
?"🔥 높음"
:task.priority==="medium"
?"✨ 보통"
:"☁️ 낮음"}
</div>

${task.details.map(detail=>`

<div class="
detail
${detail.done?"done":""}
">

<label>

<input
type="checkbox"
${detail.done?"checked":""}
>

${detail.text}

</label>

</div>

`).join("")}

${
!task.done
?`

<div class="detail-input-wrap">

<input
id="detail-input-${task.id}"
placeholder="상세 업무 추가..."
>

<button
class="add-btn"
onclick="addDetail('${task.id}')">

추가

</button>

</div>

`
:""
}

</div>

</div>

`;

div
.querySelector('input[type="checkbox"]')
.addEventListener("change",()=>{

toggleTask(task.id);

});

div
.querySelector(".delete-btn")
.addEventListener("click",()=>{

deleteTask(task.id);

});

const detailCheckboxes =
div.querySelectorAll(".detail input");

detailCheckboxes.forEach((checkbox,index)=>{

checkbox.addEventListener("change",()=>{

toggleDetail(
task.id,
task.details[index].id
);

});

});

if(task.done){

doneList.appendChild(div);

}else{

taskList.appendChild(div);

}

});

}

function updateProgress(){

let total = 0;
let done = 0;

tasks.forEach(task=>{

total++;

if(task.done){
done++;
}

task.details.forEach(detail=>{

total++;

if(detail.done){
done++;
}

});

});

const percent =
total===0
?0
:Math.round(
(done/total)*100
);

document.getElementById("percent")
.innerText =
percent + "%";

document.getElementById("progressFill")
.style.width =
percent + "%";

}

function addMemo(){

const type =
document.getElementById("memoType")
.value;

const title =
document.getElementById("memoTitle")
.value
.trim();

const text =
document.getElementById("memoText")
.value
.trim();

if(!title || !text) return;

memos.unshift({

id:createId(),
type,
title,
text

});

document.getElementById("memoTitle").value="";
document.getElementById("memoText").value="";

saveData();

renderAll();

}

function deleteMemo(id){

memos =
memos.filter(
m=>m.id!==id
);

saveData();

renderAll();

}

function renderMemos(){

const wrap =
document.getElementById("memoWrap");

wrap.innerHTML="";

memos.forEach(m=>{

const div =
document.createElement("div");

div.className="memo";

div.innerHTML=`

<button class="memo-delete">
✕
</button>

<div class="memo-type">
${m.type}
</div>

<div class="memo-title">
${m.title}
</div>

<div class="memo-content">
${m.text}
</div>

`;

div
.querySelector(".memo-delete")
.addEventListener("click",()=>{

deleteMemo(m.id);

});

wrap.appendChild(div);

});

}

function renderAll(){

renderTasks();

renderMemos();

updateProgress();

}

renderAll();

</script>

</body>
</html>
