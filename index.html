<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>🎀슈냥의 슬기로운 회사생활🎀</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:30px;
  font-family:sans-serif;
  background:
    radial-gradient(circle at top left,#ffe7f2 0%,transparent 25%),
    radial-gradient(circle at bottom right,#dff4ff 0%,transparent 25%),
    #f7f8fc;
}

h1{
  font-size:44px;
  margin-bottom:30px;
}

.container{
  display:grid;
  grid-template-columns:1.2fr 0.8fr;
  gap:24px;
}

.card{
  background:white;
  border-radius:28px;
  padding:24px;
  box-shadow:
    0 10px 30px rgba(0,0,0,0.06);
}

.top3{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:14px;
  margin-bottom:24px;
}

.top-card{
  padding:18px;
  border-radius:20px;
  color:white;
}

.top1{
  background:#ff92b5;
}

.top2{
  background:#b69cff;
}

.top3c{
  background:#7ec8ff;
}

input,
select,
textarea,
button{

  border:none;
  outline:none;

  border-radius:14px;

  padding:14px;

  font-size:14px;
}

input,
select,
textarea{
  background:#f3f5fa;
}

button{
  cursor:pointer;
}

.input-wrap{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.task{
  background:white;
  border-radius:24px;
  padding:20px;
  margin-bottom:18px;
  box-shadow:
    0 5px 15px rgba(0,0,0,0.05);

  transition:0.25s;
}

.task.done{

  opacity:1;

  background:#fff1f7;

  border:3px solid #ffb7d3;

  box-shadow:
    0 6px 20px rgba(255,105,180,0.12);
}

.task.done .task-title{

  text-decoration:line-through;

  color:#666;
}

.task-title{
  font-size:18px;
  font-weight:700;
}

.done-badge{

  display:inline-flex;

  align-items:center;

  gap:4px;

  margin-left:10px;

  padding:7px 12px;

  border-radius:999px;

  background:#ff5ca8;

  color:white;

  font-size:11px;

  font-weight:700;
}

.badge{
  display:inline-block;
  padding:7px 12px;
  border-radius:999px;
  font-size:12px;
  margin-top:10px;
}

.high{
  background:#ffe3e3;
  color:#ff4a4a;
}

.medium{
  background:#fff1cf;
  color:#ff9800;
}

.low{
  background:#dff1ff;
  color:#3f97d1;
}

.detail{
  background:#f5f5f5;
  padding:10px;
  border-radius:12px;
  margin-top:10px;
}

.detail.done{
  opacity:0.6;
  text-decoration:line-through;
}

.detail-input-wrap{
  display:flex;
  gap:10px;
  margin-top:14px;
}

.progress-wrap{
  margin-top:20px;
}

.progress-bar{
  height:14px;
  background:#ececec;
  border-radius:999px;
  overflow:hidden;
}

.progress-fill{
  height:100%;
  width:0%;
  background:
    linear-gradient(90deg,#ffb3d2,#ffd59e);
}

.memo{
  padding:20px;
  border-radius:24px;
  min-height:180px;
  position:relative;
  margin-bottom:16px;
}

.memo-yellow{
  background:#fff2b7;
}

.memo-pink{
  background:#ffdce8;
}

.memo-blue{
  background:#dff3ff;
}

.memo-delete{

  position:absolute;

  top:12px;
  right:12px;

  width:28px;
  height:28px;

  border-radius:50%;

  background:white;

  color:#ff4a4a;

  font-weight:bold;
}

.modal{

  position:fixed;

  inset:0;

  background:rgba(0,0,0,0.4);

  display:none;

  justify-content:center;
  align-items:center;
}

.modal-content{

  background:white;

  width:90%;
  max-width:900px;

  max-height:85vh;

  overflow:auto;

  border-radius:24px;

  padding:24px;
}

.history-item{

  display:flex;
  justify-content:space-between;
  align-items:center;

  border-bottom:1px solid #eee;

  padding:14px 0;
}

@media(max-width:1000px){

  .container{
    grid-template-columns:1fr;
  }

  .top3{
    grid-template-columns:1fr;
  }

}

</style>
</head>

<body>

<h1>
슈냥의 슬기로운 회사생활 ✨
</h1>

<div class="container">

  <!-- 왼쪽 -->
  <div>

    <div class="card">

      <div style="
        display:flex;
        justify-content:space-between;
        align-items:center;
      ">

        <h2>💼 오늘의 업무</h2>

        <button onclick="openHistory()">
          📚 히스토리
        </button>

      </div>

      <br>

      <div id="top3" class="top3"></div>

      <div class="input-wrap">

        <input
          id="taskInput"
          style="flex:1;"
          placeholder="오늘 업무 입력..."
        >

        <select id="priorityInput">

          <option value="high">
            🔥 높음
          </option>

          <option value="medium">
            ✨ 보통
          </option>

          <option value="low">
            ☁️ 낮음
          </option>

        </select>

        <button onclick="addTask()">
          추가
        </button>

      </div>

      <br>

      <div id="taskList"></div>

    </div>

  </div>

  <!-- 오른쪽 -->
  <div>

    <div class="card">

      <h2>
        🌷 오늘의 다짐
      </h2>

      <br>

      <textarea
        id="mindInput"
        rows="6"
        placeholder="오늘의 다짐..."
      ></textarea>

      <div class="progress-wrap">

        <div style="margin-bottom:10px;">

          진행률:
          <span id="percent">0%</span>

        </div>

        <div class="progress-bar">

          <div
            class="progress-fill"
            id="progressFill">
          </div>

        </div>

      </div>

    </div>

    <br>

    <div class="card">

      <h2>
        💌 사업소 요청 리스트
      </h2>

      <br>

      <div class="input-wrap">

        <select id="memoType">

          <option>
            💬 카톡
          </option>

          <option>
            ☎️ 전화
          </option>

        </select>

        <input
          id="memoTitle"
          style="flex:1;"
          placeholder="사업소명"
        >

      </div>

      <br>

      <textarea
        id="memoText"
        rows="5"
        placeholder="요청 내용..."
      ></textarea>

      <br><br>

      <button onclick="addMemo()">
        포스트잇 추가
      </button>

      <br><br>

      <div id="memoWrap"></div>

    </div>

  </div>

</div>

<!-- 히스토리 -->
<div class="modal" id="historyModal">

  <div class="modal-content">

    <h2>
      📚 업무 히스토리
    </h2>

    <br>

    <div id="historyBody"></div>

    <br>

    <button onclick="closeHistory()">
      닫기
    </button>

  </div>

</div>

<script>

const emojis = [
  "🌷","🎀","✨","💖","🍓"
];

const memoColors = [
  "memo-yellow",
  "memo-pink",
  "memo-blue"
];

let tasks =
  JSON.parse(localStorage.getItem("tasks")) || [];

let memos =
  JSON.parse(localStorage.getItem("memos")) || [];

let histories =
  JSON.parse(localStorage.getItem("histories")) || [];

document.getElementById("mindInput").value =
  localStorage.getItem("mindText") || "";

document
.getElementById("mindInput")
.addEventListener("input",()=>{

  localStorage.setItem(
    "mindText",
    document.getElementById("mindInput").value
  );

});

function createId(){

  return Math.random().toString(36).substring(2,12);

}

function save(){

  localStorage.setItem(
    "tasks",
    JSON.stringify(tasks)
  );

  localStorage.setItem(
    "memos",
    JSON.stringify(memos)
  );

  localStorage.setItem(
    "histories",
    JSON.stringify(histories)
  );

}

function addTask(){

  const text =
    document.getElementById("taskInput").value.trim();

  const priority =
    document.getElementById("priorityInput").value;

  if(!text) return;

  tasks.push({

    id:createId(),
    text,
    priority,
    done:false,

    emoji:
      emojis[
        Math.floor(Math.random()*emojis.length)
      ],

    details:[]

  });

  histories.unshift({

    id:createId(),
    date:new Date().toLocaleDateString(),
    type:"업무",
    text

  });

  document.getElementById("taskInput").value="";

  save();

  renderTasks();

}

document
.getElementById("taskInput")
.addEventListener("keypress",(e)=>{

  if(e.key==="Enter"){
    addTask();
  }

});

function renderTasks(){

  const list =
    document.getElementById("taskList");

  list.innerHTML="";

  const order = {
    high:3,
    medium:2,
    low:1
  };

  /* 완료는 아래로 */
  const sorted =
    [...tasks]
    .sort((a,b)=>{

      if(a.done !== b.done){

        return a.done - b.done;

      }

      return order[b.priority]
      -
      order[a.priority];

    });

  sorted.forEach(task=>{

    const div =
      document.createElement("div");

    div.className =
      `task ${task.done ? "done" : ""}`;

    let badgeClass="low";

    if(task.priority==="high"){
      badgeClass="high";
    }

    if(task.priority==="medium"){
      badgeClass="medium";
    }

    div.innerHTML = `

      <div style="
        display:flex;
        gap:12px;
      ">

        <input
          type="checkbox"
          class="task-check"
          ${task.done ? "checked" : ""}
        >

        <div style="flex:1;">

          <div style="
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:10px;
            flex-wrap:wrap;
          ">

            <div class="task-title">

              ${task.emoji}
              ${task.text}

              ${task.done ? `
                <span class="done-badge">
                  완료 ✨
                </span>
              ` : ""}

            </div>

            <button class="delete-btn">
              삭제
            </button>

          </div>

          <div class="badge ${badgeClass}">
            ${task.priority}
          </div>

          <br><br>

          <div class="detail-list"></div>

          <div class="detail-input-wrap">

            <input
              class="detail-input"
              style="flex:1;"
              placeholder="상세 업무 추가..."
            >

            <button class="detail-btn">
              추가
            </button>

          </div>

        </div>

      </div>

    `;

    /* 완료 */
    div
    .querySelector(".task-check")
    .addEventListener("change",()=>{

      task.done=!task.done;

      save();

      renderTasks();

    });

    /* 삭제 */
    div
    .querySelector(".delete-btn")
    .addEventListener("click",()=>{

      tasks =
        tasks.filter(t=>t.id!==task.id);

      save();

      renderTasks();

    });

    /* 상세업무 */
    const detailList =
      div.querySelector(".detail-list");

    task.details.forEach(detail=>{

      const detailDiv =
        document.createElement("div");

      detailDiv.className =
        `detail ${detail.done ? "done" : ""}`;

      detailDiv.innerHTML = `

        <label>

          <input
            type="checkbox"
            class="detail-check"
            ${detail.done ? "checked" : ""}
          >

          ✨ ${detail.text}

        </label>

      `;

      detailDiv
      .querySelector(".detail-check")
      .addEventListener("change",()=>{

        detail.done=!detail.done;

        save();

        renderTasks();

      });

      detailList.appendChild(detailDiv);

    });

    /* 상세 추가 */
    const detailInput =
      div.querySelector(".detail-input");

    div
    .querySelector(".detail-btn")
    .addEventListener("click",()=>{

      const value =
        detailInput.value.trim();

      if(!value) return;

      task.details.push({

        id:createId(),
        text:value,
        done:false

      });

      histories.unshift({

        id:createId(),
        date:new Date().toLocaleDateString(),
        type:"상세업무",
        text:value

      });

      detailInput.value="";

      save();

      renderTasks();

    });

    list.appendChild(div);

  });

  renderTop3();

  updateProgress();

}

function renderTop3(){

  const wrap =
    document.getElementById("top3");

  wrap.innerHTML="";

  const order = {
    high:3,
    medium:2,
    low:1
  };

  const top =
    [...tasks]

    .filter(t=>!t.done)

    .sort((a,b)=>
      order[b.priority]
      -
      order[a.priority]
    )

    .slice(0,3);

  top.forEach((task,index)=>{

    let cls="top1";

    if(index===1) cls="top2";
    if(index===2) cls="top3c";

    wrap.innerHTML += `

      <div class="top-card ${cls}">

        <div>
          TOP ${index+1}
        </div>

        <br>

        <strong>

          ${task.emoji}
          ${task.text}

        </strong>

      </div>

    `;

  });

}

function updateProgress(){

  let total=0;
  let done=0;

  tasks.forEach(task=>{

    total++;

    if(task.done) done++;

    task.details.forEach(detail=>{

      total++;

      if(detail.done) done++;

    });

  });

  const percent =
    total===0
    ? 0
    : Math.round((done/total)*100);

  document.getElementById("percent")
    .innerText = percent+"%";

  document.getElementById("progressFill")
    .style.width = percent+"%";

}

function addMemo(){

  const type =
    document.getElementById("memoType").value;

  const title =
    document.getElementById("memoTitle").value;

  const text =
    document.getElementById("memoText").value;

  if(!title || !text) return;

  memos.unshift({

    id:createId(),
    type,
    title,
    text,

    color:
      memoColors[
        Math.floor(Math.random()*memoColors.length)
      ]

  });

  document.getElementById("memoTitle").value="";
  document.getElementById("memoText").value="";

  save();

  renderMemos();

}

function deleteMemo(id){

  memos =
    memos.filter(m=>m.id!==id);

  save();

  renderMemos();

}

function renderMemos(){

  const wrap =
    document.getElementById("memoWrap");

  wrap.innerHTML="";

  memos.forEach(m=>{

    wrap.innerHTML += `

      <div class="
        memo
        ${m.color}
      ">

        <button
          class="memo-delete"
          onclick="deleteMemo('${m.id}')"
        >

          ×

        </button>

        <h3>

          ${m.type}
          ${m.title}

        </h3>

        <p>

${m.text}

        </p>

      </div>

    `;

  });

}

function openHistory(){

  document.getElementById(
    "historyModal"
  ).style.display="flex";

  renderHistory();

}

function closeHistory(){

  document.getElementById(
    "historyModal"
  ).style.display="none";

}

function deleteHistory(id){

  histories =
    histories.filter(h=>h.id!==id);

  save();

  renderHistory();

}

function renderHistory(){

  const body =
    document.getElementById("historyBody");

  body.innerHTML="";

  const grouped = {};

  histories.forEach(h=>{

    if(!grouped[h.date]){

      grouped[h.date] = [];

    }

    grouped[h.date].push(h);

  });

  Object.keys(grouped).forEach(date=>{

    body.innerHTML += `

      <h3 style="color:#ff72ac;">
        📅 ${date}
      </h3>

    `;

    grouped[date].forEach(h=>{

      body.innerHTML += `

        <div class="history-item">

          <div>

            ✨ ${h.type}
            - ${h.text}

          </div>

          <button
            onclick="deleteHistory('${h.id}')"
          >

            삭제

          </button>

        </div>

      `;

    });

  });

}

renderTasks();
renderMemos();

</script>

</body>
</html>
