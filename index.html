
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>슈냥 업무 대시보드</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Pretendard',sans-serif;

background:
linear-gradient(
135deg,
#eef4ff 0%,
#f8fbff 45%,
#ffffff 100%
);

padding:40px;

color:#1e293b;

}

.container{

display:grid;

grid-template-columns:1.2fr 0.8fr;

gap:24px;

}

.panel{

background:white;

border-radius:28px;

padding:28px;

box-shadow:
0 10px 30px rgba(59,130,246,0.08);

}

h1{

font-size:42px;

margin-bottom:8px;

}

.subtitle{

color:#64748b;

margin-bottom:28px;

}

.input-wrap{

display:flex;

gap:12px;

margin-bottom:18px;

flex-wrap:wrap;

}

input,
select,
textarea{

border:none;

outline:none;

background:#f1f5f9;

padding:15px;

border-radius:16px;

font-family:'Pretendard',sans-serif;

}

.main-input{

flex:1;

}

.add-btn{

border:none;

background:
linear-gradient(
135deg,
#4f46e5,
#6366f1
);

color:white;

padding:0 24px;

height:52px;

border-radius:16px;

cursor:pointer;

font-weight:700;

}

.task{

background:#fff;

border:1px solid #e2e8f0;

border-radius:22px;

padding:20px;

margin-bottom:16px;

}

.task.done{

opacity:0.7;

background:#f8fafc;

}

.task-title{

font-size:17px;

font-weight:700;

}

.task-title.done{

text-decoration:line-through;

color:#64748b;

}

.badge{

display:inline-block;

margin-top:12px;

padding:6px 12px;

border-radius:999px;

font-size:12px;

font-weight:700;

}

.high{
background:#fee2e2;
color:#dc2626;
}

.medium{
background:#fef3c7;
color:#d97706;
}

.low{
background:#dbeafe;
color:#2563eb;
}

.progress-bar{

width:100%;

height:16px;

background:#dbeafe;

border-radius:999px;

overflow:hidden;

margin-top:12px;

}

.progress-fill{

height:100%;

width:0%;

background:
linear-gradient(
90deg,
#4f46e5,
#60a5fa
);

transition:0.3s;

}

.memo{

background:white;

border-radius:22px;

padding:20px;

margin-bottom:16px;

border:1px solid #e2e8f0;

position:relative;

}

.memo-delete{

position:absolute;

top:12px;
right:12px;

width:28px;
height:28px;

border:none;

border-radius:50%;

background:#111827;

color:white;

cursor:pointer;

}

.memo-type{

display:inline-block;

background:#eef2ff;

padding:6px 12px;

border-radius:999px;

font-size:12px;

margin-bottom:12px;

font-weight:700;

}

.memo-title{

font-weight:700;

margin-bottom:10px;

}

.memo-content{

white-space:pre-wrap;

line-height:1.6;

}

.complete-title{

margin:28px 0 16px;

font-size:24px;

font-weight:800;

}

@media(max-width:1200px){

.container{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<h1>
슈냥 업무 대시보드 ✨
</h1>

<div class="subtitle">
오늘도 효율적으로 정리중
</div>

<div class="container">

<div class="panel">

<h2 style="margin-bottom:20px;">
💼 오늘의 업무
</h2>

<div class="input-wrap">

<input
id="taskInput"
class="main-input"
placeholder="업무 입력..."
>

<select id="priorityInput">

<option value="high">🔥 높음</option>
<option value="medium">✨ 보통</option>
<option value="low">☁️ 낮음</option>

</select>

<button
class="add-btn"
id="taskBtn">

추가

</button>

</div>

<div id="taskList"></div>

<div class="complete-title">
✅ 완료한 업무
</div>

<div id="doneTaskList"></div>

</div>

<div>

<div class="panel">

<h2>
📈 진행률
</h2>

<div
id="percent"
style="
margin-top:12px;
font-weight:700;
">

0%

</div>

<div class="progress-bar">

<div
id="progressFill"
class="progress-fill">
</div>

</div>

</div>

<br>

<div class="panel">

<h2 style="margin-bottom:18px;">
🌷 오늘의 다짐
</h2>

<textarea
id="mindText"
rows="6"
placeholder="오늘의 목표 / 다짐 입력..."
></textarea>

</div>

<br>

<div class="panel">

<h2 style="margin-bottom:18px;">
💌 요청 메모
</h2>

<div class="input-wrap">

<select id="memoType">

<option value="카톡">💬 카톡</option>
<option value="메신저">🖥️ 메신저</option>
<option value="전화">☎️ 전화</option>

</select>

<input
id="memoTitle"
class="main-input"
placeholder="제목 입력..."
>

</div>

<textarea
id="memoText"
rows="5"
placeholder="내용 입력..."
></textarea>

<br><br>

<button
class="add-btn"
id="memoBtn">

포스트잇 추가

</button>

<br><br>

<div id="memoWrap"></div>

</div>

</div>

</div>

<script>

const state = {

tasks:
JSON.parse(
localStorage.getItem("tasks")
) || [],

memos:
JSON.parse(
localStorage.getItem("memos")
) || []

};

function save(){

localStorage.setItem(
"tasks",
JSON.stringify(state.tasks)
);

localStorage.setItem(
"memos",
JSON.stringify(state.memos)
);

}

function createId(){

return Date.now().toString(36)
+
Math.random().toString(36).slice(2);

}

function renderTasks(){

const taskList =
document.getElementById("taskList");

const doneList =
document.getElementById("doneTaskList");

taskList.innerHTML="";
doneList.innerHTML="";

state.tasks.forEach(task=>{

const div =
document.createElement("div");

div.className=
`task ${task.done?"done":""}`;

div.innerHTML = `

<div style="display:flex;gap:12px;">

<input
type="checkbox"
${task.done?"checked":""}
data-id="${task.id}"
class="task-check"
>

<div style="flex:1;">

<div style="
display:flex;
justify-content:space-between;
align-items:center;
">

<div class="
task-title
${task.done?"done":""}
">

${task.text}

</div>

<button
class="memo-delete"
data-delete="${task.id}">

✕

</button>

</div>

<div class="badge ${task.priority}">
${task.priority}
</div>

</div>

</div>

`;

if(task.done){

doneList.appendChild(div);

}else{

taskList.appendChild(div);

}

});

}

function renderMemos(){

const wrap =
document.getElementById("memoWrap");

wrap.innerHTML="";

state.memos.forEach(memo=>{

const div =
document.createElement("div");

div.className="memo";

div.innerHTML=`

<button
class="memo-delete"
data-memo-delete="${memo.id}">

✕

</button>

<div class="memo-type">
${memo.type}
</div>

<div class="memo-title">
${memo.title}
</div>

<div class="memo-content">
${memo.text}
</div>

`;

wrap.appendChild(div);

});

}

function updateProgress(){

let total =
state.tasks.length;

let done =
state.tasks.filter(
t=>t.done
).length;

const percent =
total===0
?0
:Math.round(
(done/total)*100
);

document.getElementById("percent")
.textContent =
percent + "%";

document.getElementById("progressFill")
.style.width =
percent + "%";

}

function renderAll(){

renderTasks();

renderMemos();

updateProgress();

save();

}

document
.getElementById("taskBtn")
.addEventListener("click",()=>{

const text =
document.getElementById("taskInput")
.value
.trim();

const priority =
document.getElementById("priorityInput")
.value;

if(!text)return;

state.tasks.unshift({

id:createId(),
text,
priority,
done:false

});

document.getElementById("taskInput").value="";

renderAll();

});

document
.getElementById("memoBtn")
.addEventListener("click",()=>{

const type =
document.getElementById("memoType")
.value;

const title =
document.getElementById("memoTitle")
.value
.trim();

const text =
document.getElementById("memoText")
.value
.trim();

if(!title || !text)return;

state.memos.unshift({

id:createId(),
type,
title,
text

});

document.getElementById("memoTitle").value="";
document.getElementById("memoText").value="";

renderMemos();

save();

});

document.addEventListener("change",(e)=>{

if(
e.target.classList.contains(
"task-check"
)
){

const id =
e.target.dataset.id;

const task =
state.tasks.find(
t=>t.id===id
);

task.done =
e.target.checked;

renderAll();

}

});

document.addEventListener("click",(e)=>{

if(e.target.dataset.delete){

state.tasks =
state.tasks.filter(
t=>
t.id!==e.target.dataset.delete
);

renderAll();

}

if(e.target.dataset.memoDelete){

state.memos =
state.memos.filter(
m=>
m.id!==e.target.dataset.memoDelete
);

renderMemos();

save();

}

});

const mindText =
document.getElementById("mindText");

mindText.value =
localStorage.getItem("mindText")
|| "";

mindText.addEventListener("input",()=>{

localStorage.setItem(
"mindText",
mindText.value
);

});

renderAll();

</script>

</body>
</html>
