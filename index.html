<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>슈냥의 슬기로운 회사생활</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  font-family:'Pretendard',sans-serif;

  background:
    radial-gradient(circle at top left,#ffe8f3 0%,transparent 28%),
    radial-gradient(circle at bottom right,#e8f5ff 0%,transparent 28%),
    #f7f7f7;

  min-height:100vh;

  padding:30px;

  color:#1f1f1f;
}

.container{
  max-width:1850px;
  margin:auto;
}

/* 상단 */

.top-area{

  display:flex;
  justify-content:space-between;
  align-items:flex-start;

  gap:24px;

  margin-bottom:28px;

  flex-wrap:wrap;
}

.title-box h1{

  font-size:48px;
  line-height:1.35;
}

.title-box p{

  margin-top:14px;

  color:#777;

  font-size:15px;
}

.top-right{

  display:flex;

  gap:20px;

  flex-wrap:wrap;
}

/* 다짐 */

.mind-card{

  width:420px;

  background:
    linear-gradient(
      135deg,
      rgba(255,255,255,0.92),
      rgba(255,245,250,0.92)
    );

  border-radius:34px;

  padding:24px;

  box-shadow:
    0 14px 30px rgba(0,0,0,0.05);

  border:
    2px dashed #ffd7ea;
}

.mind-title{

  font-size:18px;
  font-weight:700;

  color:#ff7eb6;

  margin-bottom:18px;
}

.quote-box{

  background:white;

  border-radius:24px;

  padding:18px;

  line-height:1.8;

  font-size:14px;

  color:#555;

  margin-bottom:16px;

  box-shadow:
    0 6px 18px rgba(0,0,0,0.04);
}

.quote-highlight{
  color:#ff7eb6;
  font-weight:700;
}

.mind-input{

  width:100%;

  border:none;
  outline:none;

  resize:none;

  border-radius:22px;

  padding:18px;

  background:
    rgba(255,255,255,0.75);

  min-height:110px;

  font-size:14px;

  line-height:1.8;

  font-family:'Pretendard',sans-serif;
}

/* 진행률 */

.progress-card{

  width:320px;

  background:
    rgba(255,255,255,0.85);

  border-radius:32px;

  padding:24px;

  box-shadow:
    0 12px 28px rgba(0,0,0,0.05);
}

.progress-top{

  display:flex;
  justify-content:space-between;

  margin-bottom:14px;
}

.progress-percent{

  font-size:34px;
  font-weight:700;
}

.progress-bar{

  width:100%;
  height:14px;

  background:#ececec;

  border-radius:999px;

  overflow:hidden;
}

.progress-fill{

  width:0%;
  height:100%;

  border-radius:999px;

  background:
    linear-gradient(90deg,#ffb7d9,#ffd8ad);

  transition:0.3s;
}

/* 메인 */

.dashboard{

  display:grid;

  grid-template-columns:1.15fr 0.85fr;

  gap:24px;
}

.board{

  background:
    rgba(255,255,255,0.82);

  border-radius:38px;

  padding:28px;

  box-shadow:
    0 14px 38px rgba(0,0,0,0.05);

  position:relative;
}

.board-header{

  display:flex;
  justify-content:space-between;
  align-items:center;

  margin-bottom:24px;
}

.board-title{

  font-size:28px;
  font-weight:700;
}

/* 히스토리 버튼 */

.history-btn{

  border:none;

  background:#1f1f1f;

  color:white;

  padding:10px 16px;

  border-radius:14px;

  cursor:pointer;

  font-size:12px;
  font-weight:700;
}

/* TOP3 */

.top-priority-wrap{

  display:grid;

  grid-template-columns:1fr 1fr 1fr;

  gap:14px;

  margin-bottom:28px;
}

.priority-rank{

  border-radius:28px;

  padding:20px;

  color:white;
}

.rank1{
  background:linear-gradient(135deg,#ff7eb6,#ffb199);
}

.rank2{
  background:linear-gradient(135deg,#a18cd1,#fbc2eb);
}

.rank3{
  background:linear-gradient(135deg,#84fab0,#8fd3f4);
}

.rank-number{

  font-size:13px;

  opacity:0.8;

  margin-bottom:10px;
}

.rank-title{

  font-size:15px;
  font-weight:700;

  line-height:1.5;
}

/* 입력 */

.input-wrap{

  display:flex;
  flex-wrap:wrap;

  gap:12px;

  margin-bottom:26px;
}

.task-input,
.priority-select,
.memo-input,
.memo-select,
.memo-textarea,
.ai-input{

  border:none;
  outline:none;

  background:white;

  border-radius:18px;

  padding:16px;

  font-size:14px;

  box-shadow:
    0 6px 18px rgba(0,0,0,0.05);
}

.task-input{

  flex:1;

  min-width:240px;
}

.priority-select{
  width:140px;
}

.add-btn,
.memo-btn,
.ai-btn{

  border:none;

  background:#1f1f1f;

  color:white;

  border-radius:18px;

  padding:0 24px;

  cursor:pointer;

  font-weight:600;
}

/* 업무 카드 */

.task-list{

  display:flex;
  flex-direction:column;

  gap:18px;
}

.task-card{

  background:white;

  border-radius:28px;

  padding:20px;

  box-shadow:
    0 10px 24px rgba(0,0,0,0.05);
}

.task-main{

  display:flex;

  gap:14px;
}

.task-checkbox{

  width:22px;
  height:22px;

  margin-top:2px;

  accent-color:#ff9fcf;
}

.task-content{
  flex:1;
}

.task-title{

  font-size:16px;
  font-weight:700;

  line-height:1.6;
}

.done .task-title{

  text-decoration:line-through;

  opacity:0.5;
}

.priority-badge{

  margin-top:12px;

  display:inline-flex;

  padding:8px 12px;

  border-radius:999px;

  font-size:12px;
  font-weight:700;
}

.priority-high{
  background:#ffe1e1;
  color:#ff4d4d;
}

.priority-medium{
  background:#fff0cf;
  color:#ff9800;
}

.priority-low{
  background:#e3f4ff;
  color:#4aa3df;
}

.priority-edit{

  margin-top:14px;
}

.priority-edit select{

  border:none;
  outline:none;

  background:#f4f4f4;

  border-radius:14px;

  padding:10px 12px;

  font-size:12px;
}

/* 상세업무 */

.detail-list{

  margin-top:18px;

  display:flex;
  flex-direction:column;

  gap:10px;
}

.detail-item{

  background:#fafafa;

  border-radius:18px;

  padding:12px 14px;
}

.detail-row{

  display:flex;
  align-items:center;

  gap:10px;
}

.detail-check{
  accent-color:#ff9fcf;
}

.detail-text{

  font-size:14px;

  color:#555;
}

.detail-done{

  text-decoration:line-through;

  opacity:0.5;
}

.detail-input-wrap{

  display:flex;

  gap:10px;

  margin-top:16px;
}

.detail-input{

  flex:1;

  border:none;
  outline:none;

  background:#f5f5f5;

  border-radius:16px;

  padding:14px;
}

.detail-btn{

  border:none;

  background:#ffd8ea;

  border-radius:16px;

  padding:0 18px;

  cursor:pointer;

  font-weight:700;
}

/* 포스트잇 */

.memo-input-wrap{

  display:flex;
  flex-direction:column;

  gap:12px;

  margin-bottom:24px;
}

.memo-textarea{

  min-height:110px;

  resize:none;

  font-family:'Pretendard',sans-serif;
}

.memo-area{

  display:flex;
  flex-wrap:wrap;

  gap:18px;
}

.memo-card{

  width:220px;

  min-height:240px;

  padding:18px;

  border-radius:30px 26px 32px 24px;

  position:relative;

  box-shadow:
    0 12px 20px rgba(0,0,0,0.08),
    inset 0 -10px 20px rgba(255,255,255,0.35);
}

.memo-card:nth-child(odd){
  transform:rotate(-2deg);
}

.memo-card:nth-child(even){
  transform:rotate(2deg);
}

.memo-yellow{
  background:#fff4ba;
}

.memo-pink{
  background:#ffdce9;
}

.memo-blue{
  background:#dff4ff;
}

.memo-title{

  font-size:16px;
  font-weight:700;

  margin-bottom:10px;
}

.memo-text{

  font-size:14px;

  line-height:1.7;

  color:#555;

  white-space:pre-wrap;
}

/* AI */

.ai-box{

  margin-top:28px;

  background:#fffafc;

  border-radius:28px;

  padding:20px;

  border:
    2px dashed #ffd7ea;
}

.ai-title{

  font-size:18px;
  font-weight:700;

  margin-bottom:14px;

  color:#ff7eb6;
}

.ai-input-wrap{

  display:flex;

  gap:10px;
}

.ai-input{
  flex:1;
}

.ai-answer{

  margin-top:14px;

  background:white;

  border-radius:18px;

  padding:16px;

  font-size:14px;

  line-height:1.7;

  color:#555;
}

@media(max-width:1400px){

  .dashboard{
    grid-template-columns:1fr;
  }

  .top-priority-wrap{
    grid-template-columns:1fr;
  }

}

</style>
</head>

<body>

<div class="container">

  <!-- 상단 -->

  <div class="top-area">

    <div class="title-box">

      <h1>
        슈냥의<br/>
        슬기로운 회사생활
      </h1>

      <p>
        오늘도 하나씩 처리하는 중 ✨
      </p>

    </div>

    <div class="top-right">

      <div class="mind-card">

        <div class="mind-title">
          🌷 오늘의 다짐
        </div>

        <div class="quote-box">

          <span class="quote-highlight">
            “완벽하려고 멈추는 것보다,
          </span>

          <br/>

          일단 끝내는 사람이 결국 앞으로 간다.”

        </div>

        <textarea
          id="mindInput"
          class="mind-input"
          placeholder="오늘 나의 다짐 적기 ✨"
        ></textarea>

      </div>

      <div class="progress-card">

        <div class="progress-top">

          <div>
            오늘의 진행률
          </div>

          <div
            class="progress-percent"
            id="progressPercent">

            0%

          </div>

        </div>

        <div class="progress-bar">

          <div
            class="progress-fill"
            id="progressFill">
          </div>

        </div>

      </div>

    </div>

  </div>

  <!-- 메인 -->

  <div class="dashboard">

    <!-- 왼쪽 -->

    <div class="board">

      <div class="board-header">

        <div class="board-title">
          💼 오늘의 업무
        </div>

        <button class="history-btn">
          📚 히스토리 관리
        </button>

      </div>

      <!-- TOP3 -->

      <div
        class="top-priority-wrap"
        id="topPriorityWrap">
      </div>

      <!-- 입력 -->

      <div class="input-wrap">

        <input
          type="text"
          id="taskInput"
          class="task-input"
          placeholder="오늘 해야 할 업무 입력..."
        />

        <select
          id="priorityInput"
          class="priority-select">

          <option value="high">
            🔥 높음
          </option>

          <option value="medium">
            ✨ 보통
          </option>

          <option value="low">
            ☁️ 낮음
          </option>

        </select>

        <button
          class="add-btn"
          onclick="addTask()">

          추가

        </button>

      </div>

      <div
        class="task-list"
        id="taskList">
      </div>

    </div>

    <!-- 오른쪽 -->

    <div class="board">

      <div class="board-title">
        💌 사업소 요청 리스트
      </div>

      <div class="memo-input-wrap">

        <select
          id="memoType"
          class="memo-select">

          <option value="💬 카톡">
            💬 카톡
          </option>

          <option value="☎️ 전화">
            ☎️ 전화
          </option>

        </select>

        <input
          type="text"
          id="memoTitle"
          class="memo-input"
          placeholder="사업소명 / 제목"
        />

        <textarea
          id="memoText"
          class="memo-textarea"
          placeholder="요청 내용 정리..."
        ></textarea>

        <button
          class="memo-btn"
          onclick="addMemo()">

          포스트잇 붙이기 ✨

        </button>

      </div>

      <div
        class="memo-area"
        id="memoArea">
      </div>

      <!-- AI -->

      <div class="ai-box">

        <div class="ai-title">
          🤖 AI 빠른 질의
        </div>

        <div class="ai-input-wrap">

          <input
            type="text"
            id="aiInput"
            class="ai-input"
            placeholder="AI에게 빠르게 물어보기..."
          />

          <button
            class="ai-btn"
            onclick="askAI()">

            질문

          </button>

        </div>

        <div
          class="ai-answer"
          id="aiAnswer">

          오늘도 차근차근 처리해보자 ✨

        </div>

      </div>

    </div>

  </div>

</div>

<script>

const cuteEmojis = [
  "🌷","🎀","✨","☁️","🫧",
  "💖","🌸","🧁","🍓","🩷"
];

const memoColors = [
  "memo-yellow",
  "memo-pink",
  "memo-blue"
];

const completeMessages = [

  "오늘도 하나 해냈다 ✨",
  "고생했어! 진짜 잘하고 있어 🌷",
  "조금씩 끝내는 사람이 결국 이긴다 💖",
  "슈냥 오늘도 성장 완료 🎀",
  "수고했다! 이제 다음 업무 가보자 ☁️"

];

let tasks =
  JSON.parse(localStorage.getItem("tasks"))
  || [];

let memos =
  JSON.parse(localStorage.getItem("memos"))
  || [];

document.getElementById("mindInput").value =
  localStorage.getItem("mindText")
  || "";

/* 저장 */

function saveAll(){

  localStorage.setItem(
    "tasks",
    JSON.stringify(tasks)
  );

  localStorage.setItem(
    "memos",
    JSON.stringify(memos)
  );

}

/* 다짐 저장 */

document
.getElementById("mindInput")
.addEventListener("input",function(){

  localStorage.setItem(
    "mindText",
    this.value
  );

});

/* 랜덤 */

function randomEmoji(){

  return cuteEmojis[
    Math.floor(Math.random()*cuteEmojis.length)
  ];

}

function randomMemoColor(){

  return memoColors[
    Math.floor(Math.random()*memoColors.length)
  ];

}

function randomCompleteMessage(){

  return completeMessages[
    Math.floor(
      Math.random()*completeMessages.length
    )
  ];

}

/* 업무 추가 */

function addTask(){

  const text =
    document.getElementById("taskInput").value.trim();

  const priority =
    document.getElementById("priorityInput").value;

  if(!text) return;

  tasks.unshift({

    id:Date.now(),
    text,
    priority,
    done:false,
    emoji:randomEmoji(),
    details:[]

  });

  document.getElementById("taskInput").value="";

  saveAll();

  renderTasks();

}

/* 엔터 */

document
.getElementById("taskInput")
.addEventListener("keypress",function(e){

  if(e.key==="Enter"){
    addTask();
  }

});

/* 업무 완료 */

function toggleTask(id){

  tasks = tasks.map(task=>{

    if(task.id===id){

      task.done=!task.done;

      if(task.done){

        alert(
          randomCompleteMessage()
        );

      }

    }

    return task;

  });

  saveAll();

  renderTasks();

}

/* 우선순위 */

function changePriority(id,value){

  tasks = tasks.map(task=>{

    if(task.id===id){
      task.priority=value;
    }

    return task;

  });

  saveAll();

  renderTasks();

}

/* 상세업무 */

function addDetail(taskId,text){

  if(!text.trim()) return;

  tasks = tasks.map(task=>{

    if(task.id===taskId){

      task.details.push({

        text,
        done:false

      });

    }

    return task;

  });

  saveAll();

  renderTasks();

}

/* 상세 완료 */

function toggleDetail(taskId,index){

  tasks = tasks.map(task=>{

    if(task.id===taskId){

      task.details[index].done =
        !task.details[index].done;

      if(task.details[index].done){

        alert(
          randomCompleteMessage()
        );

      }

    }

    return task;

  });

  saveAll();

  renderTasks();

}

/* 요청 */

function addMemo(){

  const type =
    document.getElementById("memoType").value;

  const title =
    document.getElementById("memoTitle").value.trim();

  const text =
    document.getElementById("memoText").value.trim();

  if(!title || !text) return;

  memos.unshift({

    id:Date.now(),
    type,
    title,
    text,
    color:randomMemoColor()

  });

  document.getElementById("memoTitle").value="";
  document.getElementById("memoText").value="";

  saveAll();

  renderMemos();

}

/* 진행률 */

function updateProgress(){

  let total = 0;
  let done = 0;

  tasks.forEach(task=>{

    total++;

    if(task.done){
      done++;
    }

    task.details.forEach(detail=>{

      total++;

      if(detail.done){
        done++;
      }

    });

  });

  const percent =
    total===0
    ? 0
    : Math.round((done/total)*100);

  document.getElementById(
    "progressPercent"
  ).innerText = `${percent}%`;

  document.getElementById(
    "progressFill"
  ).style.width = `${percent}%`;

}

/* TOP3 */

function renderTopPriority(){

  const wrap =
    document.getElementById("topPriorityWrap");

  wrap.innerHTML="";

  const sorted = [...tasks]
    .filter(task=>task.priority==="high")
    .slice(0,3);

  sorted.forEach((task,index)=>{

    const div =
      document.createElement("div");

    div.className =
      `priority-rank rank${index+1}`;

    div.innerHTML = `

      <div class="rank-number">
        TOP ${index+1}
      </div>

      <div class="rank-title">

        ${task.emoji}
        ${task.text}

      </div>

    `;

    wrap.appendChild(div);

  });

}

/* 업무 렌더 */

function renderTasks(){

  const taskList =
    document.getElementById("taskList");

  taskList.innerHTML="";

  tasks.forEach(task=>{

    const card =
      document.createElement("div");

    card.className =
      `task-card ${task.done ? "done" : ""}`;

    let badgeClass="";
    let badgeText="";

    if(task.priority==="high"){

      badgeClass="priority-high";
      badgeText="🔥 우선순위 높음";

    }else if(task.priority==="medium"){

      badgeClass="priority-medium";
      badgeText="✨ 우선순위 보통";

    }else{

      badgeClass="priority-low";
      badgeText="☁️ 우선순위 낮음";

    }

    let detailHTML = "";

    task.details.forEach((detail,index)=>{

      detailHTML += `

        <div class="detail-item">

          <label class="detail-row">

            <input
              type="checkbox"
              class="detail-check"
              data-index="${index}"
              ${detail.done ? "checked" : ""}
            />

            <span class="
              detail-text
              ${detail.done ? "detail-done" : ""}
            ">

              ✨ ${detail.text}

            </span>

          </label>

        </div>

      `;

    });

    card.innerHTML = `

      <div class="task-main">

        <input
          type="checkbox"
          class="task-checkbox"
          ${task.done ? "checked" : ""}
        />

        <div class="task-content">

          <div class="task-title">

            ${task.emoji}
            ${task.text}

          </div>

          <div class="priority-badge ${badgeClass}">

            ${badgeText}

          </div>

          <div class="priority-edit">

            <select class="priority-select-edit">

              <option
                value="high"
                ${task.priority==="high" ? "selected" : ""}>

                🔥 높음

              </option>

              <option
                value="medium"
                ${task.priority==="medium" ? "selected" : ""}>

                ✨ 보통

              </option>

              <option
                value="low"
                ${task.priority==="low" ? "selected" : ""}>

                ☁️ 낮음

              </option>

            </select>

          </div>

          <div class="detail-list">

            ${detailHTML}

          </div>

          <div class="detail-input-wrap">

            <input
              type="text"
              class="detail-input"
              placeholder="상세 업무 추가..."
            />

            <button class="detail-btn">

              + 추가

            </button>

          </div>

        </div>

      </div>

    `;

    /* 업무 완료 */

    card.querySelector(".task-checkbox")
      .addEventListener("change",()=>{

        toggleTask(task.id);

      });

    /* 우선순위 */

    card.querySelector(".priority-select-edit")
      .addEventListener("change",(e)=>{

        changePriority(
          task.id,
          e.target.value
        );

      });

    /* 상세 추가 */

    const detailInput =
      card.querySelector(".detail-input");

    const detailBtn =
      card.querySelector(".detail-btn");

    detailBtn.addEventListener("click",()=>{

      addDetail(
        task.id,
        detailInput.value
      );

    });

    detailInput.addEventListener("keypress",(e)=>{

      if(e.key==="Enter"){

        addDetail(
          task.id,
          detailInput.value
        );

      }

    });

    /* 상세 완료 */

    card
    .querySelectorAll(".detail-check")
    .forEach(check=>{

      check.addEventListener("change",()=>{

        toggleDetail(
          task.id,
          check.dataset.index
        );

      });

    });

    taskList.appendChild(card);

  });

  /* 중요 */

  renderTopPriority();

  updateProgress();

}

/* 요청 렌더 */

function renderMemos(){

  const area =
    document.getElementById("memoArea");

  area.innerHTML="";

  memos.forEach(memo=>{

    const card =
      document.createElement("div");

    card.className =
      `memo-card ${memo.color}`;

    card.innerHTML = `

      <div class="memo-title">

        ${memo.type}
        ${memo.title}

      </div>

      <div class="memo-text">

${memo.text}

      </div>

    `;

    area.appendChild(card);

  });

}

/* AI */

function askAI(){

  const input =
    document.getElementById("aiInput").value;

  const answer =
    document.getElementById("aiAnswer");

  if(!input.trim()) return;

  answer.innerHTML = `

    ✨ "${input}" 관련해서는
    우선순위를 나누고
    하나씩 처리하는 게 좋아 보여!

  `;

}

renderTasks();

renderMemos();
