<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Work!hhhharrrrrrd🌊</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* =========================
기본
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Pretendard',sans-serif;

background:
linear-gradient(
180deg,
#7dd3fc 0%,
#bae6fd 18%,
#e0f2fe 38%,
#f0f9ff 60%,
#ffffff 100%
);

padding:40px;

min-height:100vh;

color:#0f172a;

overflow-x:hidden;

position:relative;

}

/* 물결 */

body::before{

content:"";

position:fixed;

left:-10%;
bottom:-120px;

width:120%;
height:260px;

background:
radial-gradient(
circle at 50% 0%,
rgba(255,255,255,0.65),
rgba(255,255,255,0)
70%
);

animation:wave 8s ease-in-out infinite;

pointer-events:none;

}

@keyframes wave{

0%{
transform:translateX(0px);
}

50%{
transform:translateX(-40px);
}

100%{
transform:translateX(0px);
}

}

h1{

font-size:44px;
font-weight:800;

margin-bottom:8px;

color:#075985;

letter-spacing:-1px;

}

.subtitle{

color:#0369a1;

margin-bottom:30px;

font-weight:500;

}

/* =========================
레이아웃
========================= */

.container{

display:grid;

grid-template-columns:1.2fr 0.8fr;

gap:24px;

}

.panel{

background:
rgba(255,255,255,0.72);

backdrop-filter:blur(18px);

border-radius:32px;

padding:28px;

border:
1px solid rgba(255,255,255,0.7);

box-shadow:
0 10px 35px rgba(14,165,233,0.12);

}

.section-title{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:22px;

}

.section-title h2{

font-size:28px;

font-weight:800;

color:#0c4a6e;

}

/* =========================
버튼
========================= */

.history-btn,
.add-btn{

border:none;

background:
linear-gradient(
135deg,
#06b6d4,
#38bdf8
);

color:white;

cursor:pointer;

font-weight:700;

transition:0.2s;

box-shadow:
0 8px 20px rgba(56,189,248,0.22);

}

.history-btn{

padding:12px 18px;

border-radius:16px;

}

.add-btn{

padding:0 24px;

height:52px;

border-radius:18px;

}

.history-btn:hover,
.add-btn:hover{

transform:translateY(-2px);

}

/* =========================
입력창
========================= */

.input-wrap{

display:flex;

gap:12px;

flex-wrap:wrap;

margin-bottom:18px;

}

input,
select,
textarea{

border:none;

outline:none;

background:
rgba(255,255,255,0.92);

padding:15px;

border-radius:18px;

font-size:14px;

font-family:'Pretendard',sans-serif;

box-shadow:
inset 0 0 0 1px rgba(186,230,253,0.8);

}

input:focus,
select:focus,
textarea:focus{

box-shadow:
0 0 0 3px rgba(56,189,248,0.18);

}

.main-input{

flex:1;

}

/* =========================
업무 카드
========================= */

.task{

background:
rgba(255,255,255,0.92);

border-radius:24px;

padding:22px;

margin-bottom:16px;

border:
1px solid rgba(186,230,253,0.7);

box-shadow:
0 8px 24px rgba(14,165,233,0.08);

transition:0.2s;

}

.task:hover{

transform:translateY(-2px);

}

.task.done{

background:#eff6ff;

opacity:0.78;

}

.task-title{

font-size:17px;

font-weight:700;

line-height:1.6;

color:#0f172a;

}

.task-title.done{

text-decoration:line-through !important;

color:#64748b;

opacity:0.6;

}

/* 중요도 */

.badge{

display:inline-block;

margin-top:12px;

padding:7px 12px;

border-radius:999px;

font-size:12px;

font-weight:700;

}

.high{

background:#fee2e2;
color:#dc2626;

}

.medium{

background:#fef9c3;
color:#ca8a04;

}

.low{

background:#dbeafe;
color:#2563eb;

}

/* 상세업무 */

.detail{

background:#f0f9ff;

padding:12px;

border-radius:14px;

margin-top:10px;

}

/* 삭제버튼 */

.delete-btn{

border:none;

background:#e0f2fe;

color:#0369a1;

padding:8px 12px;

border-radius:12px;

cursor:pointer;

font-size:12px;

font-weight:700;

}

/* 완료영역 */

.complete-title{

margin-top:30px;

margin-bottom:16px;

font-size:24px;

font-weight:800;

color:#075985;

}

/* =========================
메모
========================= */

.memo{

background:
linear-gradient(
180deg,
rgba(255,255,255,0.95),
rgba(240,249,255,0.92)
);

border-radius:24px;

padding:22px;

margin-bottom:16px;

position:relative;

border:
1px solid rgba(186,230,253,0.7);

box-shadow:
0 8px 24px rgba(14,165,233,0.08);

}

.memo-delete{

position:absolute;

top:12px;
right:12px;

width:28px;
height:28px;

border:none;

border-radius:50%;

background:#0ea5e9;

color:white;

cursor:pointer;

}

.memo-type{

display:inline-block;

background:#dbeafe;

color:#0369a1;

padding:6px 12px;

border-radius:999px;

font-size:12px;

font-weight:700;

margin-bottom:12px;

}

.memo-title{

font-size:16px;

font-weight:700;

margin-bottom:10px;

}

.memo-content{

white-space:pre-wrap;

line-height:1.7;

color:#334155;

}

/* =========================
모달
========================= */

.modal{

position:fixed;

inset:0;

background:rgba(15,23,42,0.45);

display:none;

justify-content:center;
align-items:center;

z-index:999;

}

.modal-content{

width:90%;
max-width:800px;

background:white;

padding:28px;

border-radius:30px;

max-height:80vh;

overflow:auto;

box-shadow:
0 15px 45px rgba(15,23,42,0.18);

}

.history-item{

display:flex;

justify-content:space-between;

align-items:center;

padding:14px 0;

border-bottom:
1px solid #e0f2fe;

}

/* =========================
반응형
========================= */

@media(max-width:1200px){

.container{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<h1>
업무 대시보드 🌊
</h1>

<div class="subtitle">
업무 정리 가보자구~!!!!
</div>

<div class="container">

<!-- 왼쪽 -->

<div class="panel">

<div class="section-title">

<h2>
💼 오늘 해야할 일
</h2>

<button
class="history-btn"
onclick="openHistory()">

히스토리

</button>

</div>

<div class="input-wrap">

<input
id="taskInput"
class="main-input"
placeholder="업무 입력."
>

<select id="priorityInput">

<option value="high">
🔥 높음
</option>

<option value="medium">
✨ 보통
</option>

<option value="low">
☁️ 낮음
</option>

</select>

<button
class="add-btn"
onclick="addTask()">

추가

</button>

</div>

<div id="taskList"></div>

<div class="complete-title">
✅ 완료한 업무
</div>

<div id="doneTaskList"></div>

</div>

<!-- 오른쪽 -->

<div>

<div class="panel">

<h2 style="margin-bottom:18px;">
🌷 오늘의 다짐
</h2>

<textarea
id="mindText"
rows="7"
placeholder="오늘의 목표 / 다짐 / 메모 입력."
></textarea>

</div>

<br>

<div class="panel">

<h2 style="margin-bottom:18px;">
💌 요청 메모
</h2>

<div class="input-wrap">

<select id="memoType">

<option value="카톡">
💬 카톡
</option>

<option value="메신저">
🖥️ 메신저
</option>

<option value="전화">
☎️ 전화
</option>

</select>

<input
id="memoTitle"
class="main-input"
placeholder="사업소/담당자/내용"
>

</div>

<textarea
id="memoText"
rows="5"
placeholder="내용 입력..."
></textarea>

<br><br>

<button
class="add-btn"
onclick="addMemo()">

포스트잇 추가

</button>

<br><br>

<div id="memoWrap"></div>

</div>

</div>

</div>

<!-- 히스토리 -->

<div class="modal" id="historyModal">

<div class="modal-content">

<h2 style="margin-bottom:20px;">
📚 업무 히스토리
</h2>

<div id="historyList"></div>

<br>

<button
class="add-btn"
onclick="closeHistory()">

닫기

</button>

</div>

</div>

<script>

const state = {

tasks:
JSON.parse(localStorage.getItem("tasks")) || [],

memos:
JSON.parse(localStorage.getItem("memos")) || [],

histories:
JSON.parse(localStorage.getItem("histories")) || []

};

function saveData(){

localStorage.setItem(
"tasks",
JSON.stringify(state.tasks)
);

localStorage.setItem(
"memos",
JSON.stringify(state.memos)
);

localStorage.setItem(
"histories",
JSON.stringify(state.histories)
);

}

/* =========================
업무 추가
========================= */

function addTask(){

const text =
document.getElementById("taskInput")
.value
.trim();

const priority =
document.getElementById("priorityInput")
.value;

if(!text)return;

const task = {

id:Date.now(),
text,
priority,
done:false,
details:[]

};

state.tasks.unshift(task);

state.histories.unshift({

id:Date.now()+1,
text,
date:new Date().toLocaleDateString()

});

document.getElementById("taskInput").value="";

saveData();
renderAll();

}

/* =========================
상세업무 추가
========================= */

function addDetail(taskId){

const input =
document.getElementById(
`detail-input-${taskId}`
);

const value =
input.value.trim();

if(!value)return;

const task =
state.tasks.find(
t=>t.id==taskId
);

task.details.push({

id:Date.now(),
text:value,
done:false

});

saveData();
renderAll();

}

/* =========================
메모 추가
========================= */

function addMemo(){

const type =
document.getElementById("memoType")
.value;

const title =
document.getElementById("memoTitle")
.value
.trim();

const text =
document.getElementById("memoText")
.value
.trim();

if(!title || !text){
return;
}

state.memos.unshift({

id:Date.now(),
type,
title,
text

});

saveData();

document.getElementById("memoTitle").value="";
document.getElementById("memoText").value="";

renderMemos();

}

/* =========================
업무 렌더
========================= */

function renderTasks(){

const taskList =
document.getElementById("taskList");

const doneList =
document.getElementById("doneTaskList");

taskList.innerHTML="";
doneList.innerHTML="";

state.tasks.forEach(task=>{

const div =
document.createElement("div");

div.className =
`task ${task.done?"done":""}`;

div.innerHTML = `

<div style="display:flex;gap:12px;">

<input
type="checkbox"
class="task-check"
data-id="${task.id}"
${task.done?"checked":""}
>

<div style="flex:1;">

<div style="
display:flex;
justify-content:space-between;
align-items:center;
">

<div class="
task-title
${task.done?"done":""}
">

${task.text}

</div>

<button
class="delete-btn"
data-delete="${task.id}">

삭제

</button>

</div>

<div class="badge ${task.priority}">
${task.priority}
</div>

${task.details.map(detail=>`

<div class="detail">

<label style="
display:flex;
gap:8px;
align-items:center;
">

<input
type="checkbox"
data-task="${task.id}"
data-detail="${detail.id}"
${detail.done?"checked":""}
>

<span style="
text-decoration:${detail.done ? "line-through" : "none"};
opacity:${detail.done ? "0.5" : "1"};
">

${detail.text}

</span>

</label>

</div>

`).join("")}

${
!task.done
?`

<div style="
display:flex;
gap:10px;
margin-top:14px;
">

<input
id="detail-input-${task.id}"
placeholder="상세 업무 추가..."
>

<button
class="add-btn"
onclick="addDetail('${task.id}')">

추가

</button>

</div>

`
:""
}

</div>

</div>

`;

if(task.done){

doneList.appendChild(div);

}else{

taskList.appendChild(div);

}

});

}

/* =========================
메모 렌더
========================= */

function renderMemos(){

const wrap =
document.getElementById("memoWrap");

wrap.innerHTML = "";

state.memos.forEach(m=>{

const memoDiv =
document.createElement("div");

memoDiv.className = "memo";

memoDiv.innerHTML = `

<button
class="memo-delete"
data-memo-delete="${m.id}">

✕

</button>

<div class="memo-type">
${m.type}
</div>

<div class="memo-title">
${m.title}
</div>

<div class="memo-content">
${m.text}
</div>

`;

wrap.appendChild(memoDiv);

});

saveData();

}

/* =========================
히스토리 렌더
========================= */

function renderHistory(){

const wrap =
document.getElementById("historyList");

wrap.innerHTML="";

if(state.histories.length===0){

wrap.innerHTML = `
<div style="
text-align:center;
padding:30px;
color:#64748b;
">
아직 히스토리가 없습니다.
</div>
`;

return;

}

state.histories.forEach(h=>{

const div =
document.createElement("div");

div.className="history-item";

div.innerHTML = `

<div style="
flex:1;
padding-right:14px;
line-height:1.6;
">

📅 ${h.date}<br>
${h.text}

</div>

<button
class="delete-btn"
data-history-delete="${h.id}">

삭제

</button>

`;

wrap.appendChild(div);

});

}

/* =========================
전체 렌더
========================= */

function renderAll(){

renderTasks();

renderMemos();

renderHistory();

saveData();

}

/* =========================
히스토리
========================= */

function openHistory(){

renderHistory();

document.getElementById(
"historyModal"
).style.display="flex";

}

function closeHistory(){

document.getElementById(
"historyModal"
).style.display="none";

}

/* =========================
체크 이벤트
========================= */

document.addEventListener("change",(e)=>{

if(
e.target.classList.contains(
"task-check"
)
){

const task =
state.tasks.find(
t=>t.id==e.target.dataset.id
);

task.done =
e.target.checked;

saveData();
renderAll();

}

if(e.target.dataset.detail){

const task =
state.tasks.find(
t=>t.id==e.target.dataset.task
);

const detail =
task.details.find(
d=>d.id==e.target.dataset.detail
);

detail.done =
e.target.checked;

saveData();
renderAll();

}

});

/* =========================
삭제 이벤트
========================= */

document.addEventListener("click",(e)=>{

if(e.target.dataset.delete){

state.tasks =
state.tasks.filter(
t=>t.id!=e.target.dataset.delete
);

saveData();
renderAll();

}

if(e.target.dataset.memoDelete){

state.memos =
state.memos.filter(
m=>m.id!=e.target.dataset.memoDelete
);

saveData();
renderMemos();

}

if(e.target.dataset.historyDelete){

state.histories =
state.histories.filter(
h=>h.id!=e.target.dataset.historyDelete
);

saveData();
renderHistory();

}

});

/* =========================
오늘의 다짐 저장
========================= */

const mindText =
document.getElementById("mindText");

mindText.value =
localStorage.getItem("mindText")
|| "";

mindText.addEventListener("input",()=>{

localStorage.setItem(
"mindText",
mindText.value
);

});

/* 최초 렌더 */

renderAll();

</script>

</body>
</html>
