<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>슈냥 업무 대시보드</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  font-family:'Pretendard',sans-serif;

  background:
    radial-gradient(circle at top left,#ffe0ef 0%,transparent 25%),
    radial-gradient(circle at bottom right,#dff3ff 0%,transparent 25%),
    linear-gradient(135deg,#fff8fc,#f5f8ff);

  min-height:100vh;

  padding:40px;

  color:#2b2b2b;
}

h1{

  font-size:48px;

  font-weight:800;

  margin-bottom:10px;
}

.subtitle{

  color:#777;

  margin-bottom:34px;
}

.container{

  display:grid;

  grid-template-columns:1.2fr 0.8fr;

  gap:28px;
}

.panel{

  background:rgba(255,255,255,0.82);

  backdrop-filter:blur(20px);

  border-radius:34px;

  padding:28px;

  box-shadow:
    0 20px 40px rgba(0,0,0,0.06);
}

.section-title{

  display:flex;

  justify-content:space-between;

  align-items:center;

  margin-bottom:22px;
}

.section-title h2{

  font-size:28px;

  font-weight:800;
}

.top3{

  display:grid;

  grid-template-columns:1fr 1fr 1fr;

  gap:14px;

  margin-bottom:28px;
}

.top-card{

  border-radius:24px;

  padding:20px;

  color:white;

  min-height:120px;
}

.top1{
  background:linear-gradient(135deg,#ff77b7,#ffb6d9);
}

.top2{
  background:linear-gradient(135deg,#9b8cff,#c4bbff);
}

.top3c{
  background:linear-gradient(135deg,#79d5ff,#b7ebff);
}

.top-rank{

  font-size:12px;

  opacity:0.8;

  margin-bottom:14px;
}

.top-task{

  font-size:16px;

  line-height:1.6;

  font-weight:700;
}

.input-wrap{

  display:flex;

  gap:12px;

  flex-wrap:wrap;

  margin-bottom:24px;
}

input,
select,
textarea{

  border:none;

  outline:none;

  background:#f4f6fb;

  border-radius:18px;

  padding:16px;

  font-family:'Pretendard',sans-serif;
}

.main-input{

  flex:1;
}

.add-btn{

  border:none;

  background:#1f1f1f;

  color:white;

  padding:0 24px;

  border-radius:18px;

  cursor:pointer;

  font-weight:700;
}

.task{

  background:white;

  border-radius:26px;

  padding:22px;

  margin-bottom:18px;

  box-shadow:
    0 10px 20px rgba(0,0,0,0.05);
}

.task.done{

  background:#fff4fa;

  border:2px solid #ffc4df;
}

.task-title{

  font-size:18px;

  font-weight:700;

  line-height:1.6;
}

.task.done .task-title{

  text-decoration:line-through;

  color:#777;
}

.done-badge{

  display:inline-block;

  margin-top:10px;

  background:#ff5ca8;

  color:white;

  font-size:11px;

  padding:6px 12px;

  border-radius:999px;
}

.badge{

  display:inline-block;

  margin-top:12px;

  padding:8px 14px;

  border-radius:999px;

  font-size:12px;

  font-weight:700;
}

.high{
  background:#ffe2ea;
  color:#ff4d8f;
}

.medium{
  background:#fff2d9;
  color:#ff9800;
}

.low{
  background:#e4f5ff;
  color:#3f9ad6;
}

.priority-select{

  border:none;

  background:#f3f5fa;

  padding:8px 12px;

  border-radius:12px;

  font-size:12px;

  font-weight:600;
}

.detail{

  background:#f6f7fb;

  border-radius:14px;

  padding:12px;

  margin-top:10px;
}

.detail.done{

  text-decoration:line-through;

  opacity:0.6;
}

.detail-input-wrap{

  display:flex;

  gap:10px;

  margin-top:16px;
}

.delete-btn{

  border:none;

  background:#ffe2ea;

  color:#ff4d8f;

  padding:10px 14px;

  border-radius:12px;

  cursor:pointer;

  font-size:12px;

  font-weight:700;
}

.complete-title{

  margin-top:34px;

  margin-bottom:18px;

  color:#ff5ca8;

  font-size:24px;

  font-weight:800;
}

.progress-card{

  margin-top:20px;
}

.progress-top{

  display:flex;

  justify-content:space-between;

  margin-bottom:12px;
}

.progress-bar{

  width:100%;

  height:16px;

  background:#ececec;

  border-radius:999px;

  overflow:hidden;
}

.progress-fill{

  height:100%;

  width:0%;

  background:
    linear-gradient(90deg,#ff9fc7,#ffd59e);

  border-radius:999px;

  transition:0.3s;
}

.memo{

  padding:22px;

  border-radius:24px;

  margin-bottom:18px;

  position:relative;
}

.memo-yellow{
  background:#fff1af;
}

.memo-pink{
  background:#ffd9e8;
}

.memo-blue{
  background:#daf1ff;
}

.memo-delete{

  position:absolute;

  top:12px;
  right:12px;

  width:28px;
  height:28px;

  border:none;

  border-radius:50%;

  background:white;

  color:#ff5ca8;

  cursor:pointer;

  font-weight:800;
}

@media(max-width:1200px){

  .container{
    grid-template-columns:1fr;
  }

  .top3{
    grid-template-columns:1fr;
  }

}

</style>
</head>

<body>

<h1>
슈냥의 슬기로운 회사생활 ✨
</h1>

<div class="subtitle">
오늘도 차근차근 해내는 중 🌷
</div>

<div class="container">

  <div class="panel">

    <div class="section-title">
      <h2>💼 오늘의 업무</h2>
    </div>

    <div id="top3" class="top3"></div>

    <div class="input-wrap">

      <input
        id="taskInput"
        class="main-input"
        placeholder="오늘 해야할 업무 입력..."
      >

      <select id="priorityInput">
        <option value="high">🔥 높음</option>
        <option value="medium" selected>✨ 보통</option>
        <option value="low">☁️ 낮음</option>
      </select>

      <button
        class="add-btn"
        onclick="addTask()">

        추가

      </button>

    </div>

    <div id="taskList"></div>

    <div class="complete-title">
      ✅ 오늘 완료한 일
    </div>

    <div id="doneTaskList"></div>

  </div>

  <div>

    <div class="panel">

      <div class="section-title">
        <h2>🌷 오늘의 다짐</h2>
      </div>

      <textarea
        rows="6"
        placeholder="오늘의 다짐 적기..."
      ></textarea>

      <div class="progress-card">

        <div class="progress-top">

          <div>
            오늘의 진행률
          </div>

          <div id="percent">
            0%
          </div>

        </div>

        <div class="progress-bar">

          <div
            id="progressFill"
            class="progress-fill">
          </div>

        </div>

      </div>

    </div>

    <br>

    <div class="panel">

      <div class="section-title">
        <h2>💌 사업소 요청 리스트</h2>
      </div>

      <div class="input-wrap">

        <input
          id="memoTitle"
          class="main-input"
          placeholder="사업소명 / 제목"
        >

      </div>

      <textarea
        id="memoText"
        rows="5"
        placeholder="요청 내용 입력..."
      ></textarea>

      <br><br>

      <button
        class="add-btn"
        onclick="addMemo()">

        포스트잇 추가

      </button>

      <br><br>

      <div id="memoWrap"></div>

    </div>

  </div>

</div>

<script>

const emojis = ["🌷","🎀","✨","💖","🍓"];

const memoColors = [
  "memo-yellow",
  "memo-pink",
  "memo-blue"
];

let tasks = [];
let memos = [];

function createId(){

  return Date.now().toString(36)
    + Math.random().toString(36).slice(2);

}

function addTask(){

  const text =
    document.getElementById("taskInput")
    .value
    .trim();

  const priority =
    document.getElementById("priorityInput")
    .value;

  if(!text) return;

  tasks.unshift({

    id:createId(),
    text,
    priority,
    done:false,
    details:[],
    emoji:
      emojis[
        Math.floor(
          Math.random()*emojis.length
        )
      ]

  });

  document.getElementById("taskInput").value="";

  renderAll();

}

function getPriorityText(priority){

  if(priority==="high") return "🔥 높음";
  if(priority==="medium") return "✨ 보통";

  return "☁️ 낮음";

}

function renderTasks(){

  const taskList =
    document.getElementById("taskList");

  const doneList =
    document.getElementById("doneTaskList");

  taskList.innerHTML="";
  doneList.innerHTML="";

  const order = {
    high:3,
    medium:2,
    low:1
  };

  const sorted =
    [...tasks]
    .sort((a,b)=>
      order[b.priority]
      -
      order[a.priority]
    );

  sorted.forEach(task=>{

    const div =
      document.createElement("div");

    div.className =
      `task ${task.done ? "done" : ""}`;

    div.innerHTML = `

      <div style="display:flex;gap:12px;">

        <input
          type="checkbox"
          class="task-check"
          ${task.done ? "checked" : ""}
        >

        <div style="flex:1;">

          <div style="
            display:flex;
            justify-content:space-between;
            gap:10px;
          ">

            <div style="flex:1;">

              <div class="task-title">
                ${task.emoji}
                ${task.text}
              </div>

              ${
                task.done
                ?
                `
                <div class="done-badge">
                  완료 ✨
                </div>
                `
                :
                ""
              }

            </div>

            <button class="delete-btn">
              삭제
            </button>

          </div>

          <div style="
            display:flex;
            gap:10px;
            align-items:center;
            margin-top:12px;
          ">

            <div class="badge ${task.priority}">
              ${getPriorityText(task.priority)}
            </div>

            <select class="priority-select">

              <option value="high"
                ${task.priority==="high" ? "selected" : ""}>
                🔥 높음
              </option>

              <option value="medium"
                ${task.priority==="medium" ? "selected" : ""}>
                ✨ 보통
              </option>

              <option value="low"
                ${task.priority==="low" ? "selected" : ""}>
                ☁️ 낮음
              </option>

            </select>

          </div>

          <div class="detail-list"></div>

          ${
            !task.done
            ?
            `
            <div class="detail-input-wrap">

              <input
                class="detail-input"
                placeholder="상세 업무 추가..."
              >

              <button class="add-btn detail-btn">
                추가
              </button>

            </div>
            `
            :
            ""
          }

        </div>

      </div>

    `;

    div
    .querySelector(".task-check")
    .addEventListener("change",()=>{

      task.done=!task.done;

      renderAll();

    });

    div
    .querySelector(".delete-btn")
    .addEventListener("click",()=>{

      tasks =
        tasks.filter(t=>t.id!==task.id);

      renderAll();

    });

    div
    .querySelector(".priority-select")
    .addEventListener("change",(e)=>{

      task.priority=e.target.value;

      renderAll();

    });

    const detailBtn =
      div.querySelector(".detail-btn");

    if(detailBtn){

      detailBtn.addEventListener("click",()=>{

        const input =
          div.querySelector(".detail-input");

        const value =
          input.value.trim();

        if(!value) return;

        task.details.push({

          id:createId(),
          text:value,
          done:false

        });

        renderAll();

      });

    }

    task.details.forEach(detail=>{

      const detailDiv =
        document.createElement("div");

      detailDiv.className =
        `detail ${detail.done ? "done" : ""}`;

      detailDiv.innerHTML = `
        <label>
          <input
            type="checkbox"
            ${detail.done ? "checked" : ""}
          >
          ✨ ${detail.text}
        </label>
      `;

      detailDiv
      .querySelector("input")
      .addEventListener("change",()=>{

        detail.done=!detail.done;

        renderAll();

      });

      div
      .querySelector(".detail-list")
      .appendChild(detailDiv);

    });

    if(task.done){

      doneList.appendChild(div);

    }else{

      taskList.appendChild(div);

    }

  });

}

function renderTop3(){

  const wrap =
    document.getElementById("top3");

  wrap.innerHTML="";

  const order = {
    high:3,
    medium:2,
    low:1
  };

  const top =
    [...tasks]
    .filter(t=>!t.done)
    .sort((a,b)=>
      order[b.priority]
      -
      order[a.priority]
    )
    .slice(0,3);

  top.forEach((task,index)=>{

    let cls="top1";

    if(index===1) cls="top2";
    if(index===2) cls="top3c";

    wrap.innerHTML += `

      <div class="top-card ${cls}">

        <div class="top-rank">
          TOP ${index+1}
        </div>

        <div class="top-task">
          ${task.emoji}
          ${task.text}
        </div>

      </div>

    `;

  });

}

function updateProgress(){

  let total=0;
  let done=0;

  tasks.forEach(task=>{

    total++;

    if(task.done) done++;

    task.details.forEach(detail=>{

      total++;

      if(detail.done) done++;

    });

  });

  const percent =
    total===0
    ? 0
    : Math.round((done/total)*100);

  document.getElementById("percent")
    .innerText = percent + "%";

  document.getElementById("progressFill")
    .style.width = percent + "%";

}

function addMemo(){

  const title =
    document.getElementById("memoTitle")
    .value
    .trim();

  const text =
    document.getElementById("memoText")
    .value
    .trim();

  if(!title || !text) return;

  memos.unshift({

    id:createId(),
    title,
    text,

    color:
      memoColors[
        Math.floor(
          Math.random()*memoColors.length
        )
      ]

  });

  document.getElementById("memoTitle").value="";
  document.getElementById("memoText").value="";

  renderMemos();

}

function renderMemos(){

  const wrap =
    document.getElementById("memoWrap");

  wrap.innerHTML="";

  memos.forEach(m=>{

    wrap.innerHTML += `

      <div class="memo ${m.color}">

        <button
          class="memo-delete"
          onclick="deleteMemo('${m.id}')">

          ×

        </button>

        <h3>
          ${m.title}
        </h3>

        <br>

        <p>${m.text}</p>

      </div>

    `;

  });

}

function deleteMemo(id){

  memos =
    memos.filter(m=>m.id!==id);

  renderMemos();

}

function renderAll(){

  renderTasks();

  renderTop3();

  renderMemos();

  updateProgress();

}

renderAll();

</script>

</body>
</html>
```
