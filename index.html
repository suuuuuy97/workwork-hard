```html
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>슈냥 업무 대시보드</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Pretendard',sans-serif;

background:
linear-gradient(
135deg,
#eef4ff 0%,
#f8fbff 45%,
#ffffff 100%
);

padding:40px;

min-height:100vh;

color:#1e293b;

}

h1{

font-size:42px;
font-weight:800;

margin-bottom:8px;

}

.subtitle{

color:#64748b;

margin-bottom:30px;

}

.container{

display:grid;

grid-template-columns:1.2fr 0.8fr;

gap:24px;

}

.panel{

background:rgba(255,255,255,0.82);

backdrop-filter:blur(20px);

border-radius:28px;

padding:28px;

box-shadow:
0 10px 30px rgba(59,130,246,0.08);

}

.section-title{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:20px;

}

.history-btn{

border:none;

background:
linear-gradient(
135deg,
#4f46e5,
#6366f1
);

color:white;

padding:12px 18px;

border-radius:14px;

cursor:pointer;

font-weight:700;

}

.input-wrap{

display:flex;

gap:12px;

flex-wrap:wrap;

margin-bottom:18px;

}

input,
select,
textarea{

border:none;

outline:none;

background:#f1f5f9;

padding:15px;

border-radius:16px;

font-size:14px;

font-family:'Pretendard',sans-serif;

}

.main-input{

flex:1;

}

.add-btn{

border:none;

background:
linear-gradient(
135deg,
#4f46e5,
#6366f1
);

color:white;

padding:0 24px;

height:52px;

border-radius:16px;

cursor:pointer;

font-weight:700;

}

.task{

background:white;

border:1px solid #e2e8f0;

border-radius:22px;

padding:20px;

margin-bottom:16px;

}

.task.done{

background:#f8fafc;

opacity:0.78;

}

.task-title{

font-size:17px;

font-weight:700;

line-height:1.6;

}

.task-title.done{

text-decoration:line-through;

color:#64748b;

}

.badge{

display:inline-block;

margin-top:12px;

padding:7px 12px;

border-radius:999px;

font-size:12px;

font-weight:700;

}

.high{
background:#fee2e2;
color:#dc2626;
}

.medium{
background:#fef3c7;
color:#d97706;
}

.low{
background:#dbeafe;
color:#2563eb;
}

.detail{

background:#f8fafc;

padding:12px;

border-radius:14px;

margin-top:10px;

}

.detail.done{

text-decoration:line-through;

opacity:0.6;

}

.detail-input-wrap{

display:flex;

gap:10px;

margin-top:14px;

}

.delete-btn{

border:none;

background:#e2e8f0;

padding:8px 12px;

border-radius:12px;

cursor:pointer;

font-size:12px;

font-weight:700;

}

.complete-title{

margin-top:30px;

margin-bottom:16px;

font-size:24px;

font-weight:800;

}

.memo{

background:white;

border:1px solid #e2e8f0;

border-radius:22px;

padding:20px;

margin-bottom:16px;

position:relative;

}

.memo-delete{

position:absolute;

top:12px;
right:12px;

width:28px;
height:28px;

border:none;

border-radius:50%;

background:#111827;

color:white;

cursor:pointer;

}

.memo-type{

display:inline-block;

background:#eef2ff;

color:#4338ca;

padding:6px 12px;

border-radius:999px;

font-size:12px;

font-weight:700;

margin-bottom:12px;

}

.memo-title{

font-size:16px;

font-weight:700;

margin-bottom:10px;

}

.memo-content{

line-height:1.6;

white-space:pre-wrap;

}

.modal{

position:fixed;

inset:0;

background:rgba(0,0,0,0.45);

display:none;

justify-content:center;
align-items:center;

z-index:999;

}

.modal-content{

width:90%;
max-width:800px;

background:white;

padding:28px;

border-radius:28px;

max-height:80vh;

overflow:auto;

}

.history-item{

display:flex;

justify-content:space-between;

align-items:center;

padding:14px 0;

border-bottom:1px solid #e5e7eb;

}

@media(max-width:1200px){

.container{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<h1>
슈냥 업무 대시보드 ✨
</h1>

<div class="subtitle">
오늘도 효율적으로 정리중
</div>

<div class="container">

<div class="panel">

<div class="section-title">

<h2>
💼 오늘의 업무
</h2>

<button
class="history-btn"
onclick="openHistory()">

히스토리

</button>

</div>

<div class="input-wrap">

<input
id="taskInput"
class="main-input"
placeholder="업무 입력..."
>

<select id="priorityInput">

<option value="high">
🔥 높음
</option>

<option value="medium">
✨ 보통
</option>

<option value="low">
☁️ 낮음
</option>

</select>

<button
class="add-btn"
onclick="addTask()">

추가

</button>

</div>

<div id="taskList"></div>

<div class="complete-title">
✅ 완료한 업무
</div>

<div id="doneTaskList"></div>

</div>

<div>

<div class="panel">

<h2 style="margin-bottom:18px;">
🌷 오늘의 다짐
</h2>

<textarea
id="mindText"
rows="7"
placeholder="오늘의 목표 / 다짐 / 메모 입력..."
></textarea>

</div>

<br>

<div class="panel">

<h2 style="margin-bottom:18px;">
💌 요청 메모
</h2>

<div class="input-wrap">

<select id="memoType">

<option value="카톡">
💬 카톡
</option>

<option value="메신저">
🖥️ 메신저
</option>

<option value="전화">
☎️ 전화
</option>

</select>

<input
id="memoTitle"
class="main-input"
placeholder="제목 입력..."
>

</div>

<textarea
id="memoText"
rows="5"
placeholder="내용 입력..."
></textarea>

<br><br>

<button
class="add-btn"
onclick="addMemo()">

포스트잇 추가

</button>

<br><br>

<div id="memoWrap"></div>

</div>

</div>

</div>

<div
class="modal"
id="historyModal">

<div class="modal-content">

<h2 style="margin-bottom:20px;">
📚 업무 히스토리
</h2>

<div id="historyList"></div>

<br>

<button
class="add-btn"
onclick="closeHistory()">

닫기

</button>

</div>

</div>

<script>

const state = {

tasks:
JSON.parse(localStorage.getItem("tasks")) || [],

memos:
JSON.parse(localStorage.getItem("memos")) || [],

histories:
JSON.parse(localStorage.getItem("histories")) || []

};

function saveData(){

localStorage.setItem(
"tasks",
JSON.stringify(state.tasks)
);

localStorage.setItem(
"memos",
JSON.stringify(state.memos)
);

localStorage.setItem(
"histories",
JSON.stringify(state.histories)
);

}

function createId(){

return Date.now().toString(36)
+
Math.random().toString(36).slice(2);

}

function addTask(){

const text =
document.getElementById("taskInput")
.value
.trim();

const priority =
document.getElementById("priorityInput")
.value;

if(!text)return;

state.tasks.unshift({

id:createId(),
text,
priority,
done:false,
details:[]

});

state.histories.unshift({

id:createId(),
text,
date:new Date().toLocaleDateString()

});

document.getElementById("taskInput").value="";

renderAll();

}

function addDetail(taskId){

const input =
document.getElementById(
`detail-input-${taskId}`
);

const value =
input.value.trim();

if(!value)return;

const task =
state.tasks.find(
t=>t.id===taskId
);

task.details.push({

id:createId(),
text:value,
done:false

});

renderAll();

}

function addMemo(){

const type =
document.getElementById("memoType").value;

const title =
document.getElementById("memoTitle")
.value
.trim();

const text =
document.getElementById("memoText")
.value
.trim();

if(!title || !text)return;

state.memos.unshift({

id:createId(),
type,
title,
text

});

document.getElementById("memoTitle").value="";
document.getElementById("memoText").value="";

renderAll();

}

function renderTasks(){

const taskList =
document.getElementById("taskList");

const doneList =
document.getElementById("doneTaskList");

taskList.innerHTML="";
doneList.innerHTML="";

state.tasks.forEach(task=>{

const div =
document.createElement("div");

div.className =
`task ${task.done?"done":""}`;

div.innerHTML = `

<div style="display:flex;gap:12px;">

<input
type="checkbox"
class="task-check"
data-id="${task.id}"
${task.done?"checked":""}
>

<div style="flex:1;">

<div style="
display:flex;
justify-content:space-between;
align-items:center;
">

<div class="
task-title
${task.done?"done":""}
">

${task.text}

</div>

<button
class="delete-btn"
data-delete="${task.id}">

삭제

</button>

</div>

<div class="badge ${task.priority}">
${task.priority}
</div>

${task.details.map(detail=>`

<div class="
detail
${detail.done?"done":""}
">

<label>

<input
type="checkbox"
data-task="${task.id}"
data-detail="${detail.id}"
${detail.done?"checked":""}
>

${detail.text}

</label>

</div>

`).join("")}

${
!task.done
?`

<div class="detail-input-wrap">

<input
id="detail-input-${task.id}"
placeholder="상세 업무 추가..."
>

<button
class="add-btn"
onclick="addDetail('${task.id}')">

추가

</button>

</div>

`
:""
}

</div>

</div>

`;

if(task.done){

doneList.appendChild(div);

}else{

taskList.appendChild(div);

}

});

}

function renderMemos(){

const wrap =
document.getElementById("memoWrap");

wrap.innerHTML="";

state.memos.forEach(m=>{

const div =
document.createElement("div");

div.className="memo";

div.innerHTML = `

<button
class="memo-delete"
data-memo-delete="${m.id}">

✕

</button>

<div class="memo-type">
${m.type}
</div>

<div class="memo-title">
${m.title}
</div>

<div class="memo-content">
${m.text}
</div>

`;

wrap.appendChild(div);

});

}

function renderHistory(){

const wrap =
document.getElementById("historyList");

wrap.innerHTML="";

state.histories.forEach(h=>{

const div =
document.createElement("div");

div.className="history-item";

div.innerHTML = `

<div>
📅 ${h.date}
- ${h.text}
</div>

<button
class="delete-btn"
data-history-delete="${h.id}">

삭제

</button>

`;

wrap.appendChild(div);

});

}

function renderAll(){

renderTasks();

renderMemos();

renderHistory();

saveData();

}

function openHistory(){

document.getElementById(
"historyModal"
).style.display="flex";

}

function closeHistory(){

document.getElementById(
"historyModal"
).style.display="none";

}

document.addEventListener("change",(e)=>{

if(
e.target.classList.contains(
"task-check"
)
){

const task =
state.tasks.find(
t=>t.id===e.target.dataset.id
);

task.done =
e.target.checked;

renderAll();

}

if(e.target.dataset.detail){

const task =
state.tasks.find(
t=>t.id===e.target.dataset.task
);

const detail =
task.details.find(
d=>d.id===e.target.dataset.detail
);

detail.done =
e.target.checked;

renderAll();

}

});

document.addEventListener("click",(e)=>{

if(e.target.dataset.delete){

state.tasks =
state.tasks.filter(
t=>t.id!==e.target.dataset.delete
);

renderAll();

}

if(e.target.dataset.memoDelete){

state.memos =
state.memos.filter(
m=>m.id!==e.target.dataset.memoDelete
);

renderAll();

}

if(e.target.dataset.historyDelete){

state.histories =
state.histories.filter(
h=>h.id!==e.target.dataset.historyDelete
);

renderAll();

}

});

const mindText =
document.getElementById("mindText");

mindText.value =
localStorage.getItem("mindText")
|| "";

mindText.addEventListener("input",()=>{

localStorage.setItem(
"mindText",
mindText.value
);

});

renderAll();

</script>

</body>
</html>
```
