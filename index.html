<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>슈냥이는 뚠뚠 Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Pretendard', sans-serif;
  min-height:100vh;
  background:
    radial-gradient(circle at top left,#fff0f6 0%,transparent 28%),
    radial-gradient(circle at bottom right,#e9f7ff 0%,transparent 28%),
    #f8f8f8;

  color:#1f1f1f;
  padding:28px;
}

.container{
  max-width:1600px;
  margin:auto;
}

.top-area{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:28px;
  gap:20px;
  flex-wrap:wrap;
}

.title-box h1{
  font-size:38px;
  font-weight:700;
  line-height:1.4;
  display:flex;
  align-items:center;
  gap:14px;
}

.main-icon{
  font-size:46px;
  animation: bounce 2s infinite;
}

@keyframes bounce{
  0%{transform:translateY(0px);}
  50%{transform:translateY(-6px);}
  100%{transform:translateY(0px);}
}

.title-box p{
  margin-top:10px;
  color:#777;
  font-size:15px;
}

.progress-card{
  width:340px;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(14px);
  border-radius:28px;
  padding:22px;
  box-shadow:0 12px 30px rgba(0,0,0,0.06);
}

.progress-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
}

.progress-title{
  font-size:15px;
  font-weight:600;
}

.progress-percent{
  font-size:30px;
  font-weight:700;
}

.progress-bar{
  width:100%;
  height:14px;
  background:#ececec;
  border-radius:999px;
  overflow:hidden;
}

.progress-fill{
  width:0%;
  height:100%;
  border-radius:999px;
  background:linear-gradient(90deg,#ffb6d9,#ffddb0);
  transition:0.3s;
}

.dashboard{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:24px;
}

.board{
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(14px);
  border-radius:34px;
  padding:26px;
  min-height:720px;
  box-shadow:0 14px 40px rgba(0,0,0,0.05);
}

.board-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:22px;
}

.board-title{
  font-size:27px;
  font-weight:700;
  display:flex;
  align-items:center;
  gap:10px;
}

.task-count{
  background:#f4f4f4;
  padding:7px 14px;
  border-radius:999px;
  font-size:13px;
  color:#666;
}

.input-wrap{
  display:flex;
  gap:12px;
  margin-bottom:24px;
}

.task-input{
  flex:1;
  border:none;
  outline:none;
  border-radius:20px;
  padding:18px;
  font-size:15px;
  background:white;
  box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

.add-btn{
  border:none;
  background:#1f1f1f;
  color:white;
  padding:0 24px;
  border-radius:20px;
  cursor:pointer;
  font-weight:600;
  transition:0.2s;
}

.add-btn:hover{
  transform:translateY(-2px);
}

.task-list{
  display:flex;
  flex-direction:column;
  gap:18px;
}

.task-card{
  background:white;
  border-radius:26px;
  padding:18px;
  box-shadow:0 10px 24px rgba(0,0,0,0.05);
  transition:0.25s;
}

.task-card:hover{
  transform:translateY(-2px);
}

.task-main{
  display:flex;
  justify-content:space-between;
  gap:12px;
}

.task-left{
  display:flex;
  gap:14px;
  align-items:flex-start;
  flex:1;
}

.task-checkbox{
  width:22px;
  height:22px;
  margin-top:2px;
  accent-color:#ff9fcf;
  cursor:pointer;
}

.task-content{
  flex:1;
}

.task-title{
  font-size:16px;
  font-weight:600;
  line-height:1.5;
  word-break:break-word;
}

.done .task-title{
  text-decoration:line-through;
  color:#aaa;
}

.subtask-list{
  margin-top:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.subtask{
  background:#fafafa;
  border-radius:16px;
  padding:12px 14px;
  font-size:14px;
  color:#666;
  line-height:1.5;
}

.subtask-input-wrap{
  display:flex;
  gap:8px;
  margin-top:14px;
}

.subtask-input{
  flex:1;
  border:none;
  outline:none;
  background:#f5f5f5;
  border-radius:14px;
  padding:12px;
  font-size:13px;
}

.subtask-btn{
  border:none;
  background:#ffd8ea;
  border-radius:14px;
  padding:0 14px;
  cursor:pointer;
  font-size:13px;
  font-weight:600;
}

.delete-btn{
  border:none;
  background:transparent;
  cursor:pointer;
  font-size:18px;
  opacity:0.45;
}

.delete-btn:hover{
  opacity:1;
}

.quote-box{
  margin-top:24px;
  background:linear-gradient(135deg,#ffeaf4,#fff0db);
  padding:22px;
  border-radius:24px;
  color:#6a5060;
  line-height:1.7;
  font-size:15px;
}

.quote-title{
  font-size:12px;
  opacity:0.7;
  margin-bottom:8px;
}

@media(max-width:1100px){

  .dashboard{
    grid-template-columns:1fr;
  }

}

</style>
</head>

<body>

<div class="container">

  <div class="top-area">

    <div class="title-box">

      <h1>
        <span class="main-icon">🐹</span>

        슈냥이는 뚠뚠<br/>
        오늘도 뚠뚠 열심히 일을 한다 뚠뚠
      </h1>

      <p>
        오늘도 하나씩 완료하는 중 ✨
      </p>

    </div>

    <div class="progress-card">

      <div class="progress-top">

        <div class="progress-title">
          오늘의 진행률
        </div>

        <div class="progress-percent" id="progressPercent">
          0%
        </div>

      </div>

      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>

    </div>

  </div>

  <div class="dashboard">

    <!-- 회사 -->
    <div class="board">

      <div class="board-header">

        <div class="board-title">
          💼 회사 업무
        </div>

        <div class="task-count" id="workCount">
          0개
        </div>

      </div>

      <div class="input-wrap">

        <input
          type="text"
          id="workInput"
          class="task-input"
          placeholder="회사에서 해야 할 일 입력..."
        />

        <button
          class="add-btn"
          onclick="addTask('work')">
          추가
        </button>

      </div>

      <div class="task-list" id="workList"></div>

    </div>

    <!-- 집 -->
    <div class="board">

      <div class="board-header">

        <div class="board-title">
          🏡 집 / 개인 할 일
        </div>

        <div class="task-count" id="homeCount">
          0개
        </div>

      </div>

      <div class="input-wrap">

        <input
          type="text"
          id="homeInput"
          class="task-input"
          placeholder="집에서 해야 할 일 입력..."
        />

        <button
          class="add-btn"
          onclick="addTask('home')">
          추가
        </button>

      </div>

      <div class="task-list" id="homeList"></div>

      <div class="quote-box">

        <div class="quote-title">
          TODAY MESSAGE
        </div>

        작은 일도 꾸준히 하면 결국 쌓인다 🌷<br/>
        오늘의 슈냥이도 열일중 🐹✨

      </div>

    </div>

  </div>

</div>

<script>

/*
========================================
새로고침 유지 기능 포함
localStorage 저장됨
같은 브라우저 + 같은 PC면 유지됨
========================================
*/

const cuteEmojis = [
  "🌷","🐹","🧸","🍓","✨","💖",
  "🐰","☁️","🫧","🎀","🌸","🧁",
  "💻","📚","📝","☕"
];

let tasks =
  JSON.parse(
    localStorage.getItem("shunyang_tasks")
  ) || [];

function saveTasks(){

  localStorage.setItem(
    "shunyang_tasks",
    JSON.stringify(tasks)
  );

}

function randomEmoji(){

  return cuteEmojis[
    Math.floor(Math.random()*cuteEmojis.length)
  ];

}

function addTask(type){

  const input =
    type === "work"
    ? document.getElementById("workInput")
    : document.getElementById("homeInput");

  const text = input.value.trim();

  if(!text) return;

  tasks.push({

    id:Date.now(),
    type,
    text,
    done:false,
    emoji:randomEmoji(),
    subtasks:[]

  });

  input.value = "";

  saveTasks();
  renderTasks();

}

function toggleTask(id){

  tasks = tasks.map(task => {

    if(task.id === id){
      task.done = !task.done;
    }

    return task;

  });

  saveTasks();
  renderTasks();

}

function deleteTask(id){

  tasks = tasks.filter(
    task => task.id !== id
  );

  saveTasks();
  renderTasks();

}

function addSubtask(id){

  const input =
    document.getElementById(`sub-${id}`);

  const text = input.value.trim();

  if(!text) return;

  tasks = tasks.map(task => {

    if(task.id === id){

      task.subtasks.push({
        text
      });

    }

    return task;

  });

  input.value = "";

  saveTasks();
  renderTasks();

}

function updateProgress(){

  const total = tasks.length;

  const done =
    tasks.filter(t=>t.done).length;

  const percent =
    total === 0
    ? 0
    : Math.round((done/total)*100);

  document.getElementById(
    "progressPercent"
  ).innerText = `${percent}%`;

  document.getElementById(
    "progressFill"
  ).style.width = `${percent}%`;

}

function renderTasks(){

  const workList =
    document.getElementById("workList");

  const homeList =
    document.getElementById("homeList");

  workList.innerHTML = "";
  homeList.innerHTML = "";

  const workTasks =
    tasks.filter(t=>t.type==="work");

  const homeTasks =
    tasks.filter(t=>t.type==="home");

  document.getElementById(
    "workCount"
  ).innerText = `${workTasks.length}개`;

  document.getElementById(
    "homeCount"
  ).innerText = `${homeTasks.length}개`;

  tasks.forEach(task=>{

    const card =
      document.createElement("div");

    card.className =
      `task-card ${task.done ? "done" : ""}`;

    let subtasksHTML = "";

    task.subtasks.forEach(sub=>{

      subtasksHTML += `
        <div class="subtask">
          💫 ${sub.text}
        </div>
      `;

    });

    card.innerHTML = `

      <div class="task-main">

        <div class="task-left">

          <input
            type="checkbox"
            class="task-checkbox"
            ${task.done ? "checked" : ""}
          />

          <div class="task-content">

            <div class="task-title">
              ${task.emoji} ${task.text}
            </div>

            <div class="subtask-list">
              ${subtasksHTML}
            </div>

            <div class="subtask-input-wrap">

              <input
                type="text"
                id="sub-${task.id}"
                class="subtask-input"
                placeholder="세부 내용 추가..."
              />

              <button class="subtask-btn">
                +추가
              </button>

            </div>

          </div>

        </div>

        <button class="delete-btn">
          ✕
        </button>

      </div>

    `;

    card.querySelector(".task-checkbox")
      .addEventListener("change",()=>{

        toggleTask(task.id);

      });

    card.querySelector(".delete-btn")
      .addEventListener("click",()=>{

        deleteTask(task.id);

      });

    card.querySelector(".subtask-btn")
      .addEventListener("click",()=>{

        addSubtask(task.id);

      });

    const subInput =
      card.querySelector(".subtask-input");

    subInput.addEventListener(
      "keypress",
      function(e){

        if(e.key==="Enter"){
          addSubtask(task.id);
        }

      }
    );

    if(task.type==="work"){
      workList.appendChild(card);
    }else{
      homeList.appendChild(card);
    }

  });

  updateProgress();

}

document
.getElementById("workInput")
.addEventListener("keypress",function(e){

  if(e.key==="Enter"){
    addTask("work");
  }

});

document
.getElementById("homeInput")
.addEventListener("keypress",function(e){

  if(e.key==="Enter"){
    addTask("home");
  }

});

renderTasks();

</script>

</body>
</html>
