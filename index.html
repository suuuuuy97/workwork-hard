<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>슈냥 업무 대시보드</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Pretendard',sans-serif;

background:
linear-gradient(
135deg,
#f5f7fb 0%,
#eef4ff 45%,
#f8f9fc 100%
);

min-height:100vh;

padding:40px;

color:#1f2937;

}

h1{

font-size:42px;
font-weight:800;

margin-bottom:8px;

}

.subtitle{

color:#6b7280;

margin-bottom:30px;

font-size:15px;

}

.container{

display:grid;

grid-template-columns:1.2fr 0.8fr;

gap:24px;

}

.panel{

background:rgba(255,255,255,0.75);

border:1px solid rgba(255,255,255,0.6);

backdrop-filter:blur(18px);

border-radius:28px;

padding:26px;

box-shadow:
0 10px 30px rgba(15,23,42,0.06);

}

.section-title{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:22px;

}

.section-title h2{

font-size:26px;
font-weight:800;

}

.history-btn{

border:none;

background:#111827;

color:white;

padding:12px 18px;

border-radius:14px;

cursor:pointer;

font-weight:700;

}

.top3{

display:grid;

grid-template-columns:1fr 1fr 1fr;

gap:14px;

margin-bottom:26px;

}

.top-card{

padding:20px;

border-radius:22px;

color:white;

min-height:120px;

}

.top1{
background:linear-gradient(135deg,#111827,#374151);
}

.top2{
background:linear-gradient(135deg,#2563eb,#60a5fa);
}

.top3c{
background:linear-gradient(135deg,#0f766e,#5eead4);
}

.top-rank{

font-size:12px;

opacity:0.8;

margin-bottom:12px;

}

.top-task{

font-size:16px;

line-height:1.5;

font-weight:700;

}

.input-wrap{

display:flex;

gap:12px;

flex-wrap:wrap;

margin-bottom:22px;

}

input,
select,
textarea{

border:none;

outline:none;

background:#f3f4f6;

border-radius:16px;

padding:15px;

font-size:14px;

font-family:'Pretendard',sans-serif;

}

input:focus,
select:focus,
textarea:focus{

background:white;

box-shadow:
0 0 0 3px rgba(59,130,246,0.15);

}

.main-input{

flex:1;

}

.add-btn{

border:none;

background:#111827;

color:white;

padding:0 24px;

height:52px;

border-radius:16px;

cursor:pointer;

font-weight:700;

}

.task{

background:white;

border-radius:22px;

padding:20px;

margin-bottom:16px;

border:1px solid #eef2f7;

box-shadow:
0 4px 14px rgba(15,23,42,0.04);

}

.task.done{

opacity:0.75;

background:#f9fafb;

}

.task-title{

font-size:17px;

font-weight:700;

line-height:1.6;

}

.task.done .task-title{

text-decoration:line-through;

color:#6b7280;

}

.done-badge{

display:inline-block;

margin-top:10px;

background:#111827;

color:white;

padding:6px 10px;

font-size:11px;

border-radius:999px;

}

.badge{

display:inline-block;

margin-top:12px;

padding:7px 12px;

border-radius:999px;

font-size:12px;

font-weight:700;

}

.high{
background:#fee2e2;
color:#dc2626;
}

.medium{
background:#fef3c7;
color:#d97706;
}

.low{
background:#dbeafe;
color:#2563eb;
}

.detail{

background:#f8fafc;

padding:12px;

border-radius:14px;

margin-top:10px;

font-size:14px;

}

.detail.done{

text-decoration:line-through;

opacity:0.6;

}

.detail-input-wrap{

display:flex;

gap:10px;

margin-top:14px;

}

.delete-btn{

border:none;

background:#f3f4f6;

padding:9px 12px;

border-radius:12px;

cursor:pointer;

font-size:12px;

font-weight:700;

}

.complete-title{

margin-top:30px;

margin-bottom:16px;

font-size:24px;

font-weight:800;

}

.progress-card{

margin-top:20px;

}

.progress-top{

display:flex;

justify-content:space-between;

margin-bottom:10px;

}

.progress-bar{

width:100%;

height:16px;

background:#e5e7eb;

border-radius:999px;

overflow:hidden;

}

.progress-fill{

height:100%;

width:0%;

background:
linear-gradient(
90deg,
#2563eb,
#60a5fa
);

transition:0.3s;

}

.memo{

padding:22px;

border-radius:22px;

margin-bottom:16px;

position:relative;

background:white;

border:1px solid #eef2f7;

box-shadow:
0 4px 14px rgba(15,23,42,0.05);

}

.memo-delete{

position:absolute;

top:12px;
right:12px;

width:28px;
height:28px;

border:none;

border-radius:50%;

background:#111827;

color:white;

cursor:pointer;

}

.memo-type{

display:inline-block;

background:#eef2ff;

color:#3730a3;

padding:6px 12px;

border-radius:999px;

font-size:12px;

font-weight:700;

margin-bottom:12px;

}

.memo-edit{

width:100%;

margin-top:12px;

}

.modal{

position:fixed;

inset:0;

background:rgba(0,0,0,0.45);

display:none;

justify-content:center;
align-items:center;

z-index:999;

}

.modal-content{

width:90%;
max-width:900px;

max-height:85vh;

overflow:auto;

background:white;

border-radius:28px;

padding:28px;

}

.history-item{

display:flex;

justify-content:space-between;

align-items:center;

padding:14px 0;

border-bottom:1px solid #e5e7eb;

}

@media(max-width:1200px){

.container{
grid-template-columns:1fr;
}

.top3{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<h1>
슈냥 업무 대시보드 ✨
</h1>

<div class="subtitle">
오늘도 차근차근 정리중
</div>

<div class="container">

<div class="panel">

<div class="section-title">

<h2>💼 오늘의 업무</h2>

<button
class="history-btn"
onclick="openHistory()">

히스토리

</button>

</div>

<div id="top3" class="top3"></div>

<div class="input-wrap">

<input
id="taskInput"
class="main-input"
placeholder="업무 입력..."
>

<select id="priorityInput">

<option value="high">
🔥 높음
</option>

<option value="medium">
✨ 보통
</option>

<option value="low">
☁️ 낮음
</option>

</select>

<button
class="add-btn"
onclick="addTask()">

추가

</button>

</div>

<div id="taskList"></div>

<div class="complete-title">
✅ 완료한 업무
</div>

<div id="doneTaskList"></div>

</div>

<div>

<div class="panel">

<div class="section-title">
<h2>📈 진행률</h2>
</div>

<div class="progress-card">

<div class="progress-top">

<div>오늘 진행률</div>

<div id="percent">0%</div>

</div>

<div class="progress-bar">

<div
id="progressFill"
class="progress-fill">
</div>

</div>

</div>

</div>

<br>

<div class="panel">

<div class="section-title">
<h2>💌 요청 메모</h2>
</div>

<div class="input-wrap">

<select id="memoType">

<option value="카톡">
💬 카톡
</option>

<option value="메신저">
🖥️ 메신저
</option>

<option value="전화">
☎️ 전화
</option>

</select>

<input
id="memoTitle"
class="main-input"
placeholder="제목 입력..."
>

</div>

<textarea
id="memoText"
rows="5"
placeholder="내용 입력..."
></textarea>

<br><br>

<button
class="add-btn"
onclick="addMemo()">

포스트잇 추가

</button>

<br><br>

<div id="memoWrap"></div>

</div>

</div>

</div>

<div class="modal" id="historyModal">

<div class="modal-content">

<h2 style="margin-bottom:20px;">
📚 업무 히스토리
</h2>

<div id="historyBody"></div>

<br>

<button
class="add-btn"
onclick="closeHistory()">

닫기

</button>

</div>

</div>

<script>

const emojis=["✨","📌","💼","📝","📊"];

let tasks=
JSON.parse(localStorage.getItem("tasks"))||[];

let memos=
JSON.parse(localStorage.getItem("memos"))||[];

let histories=
JSON.parse(localStorage.getItem("histories"))||[];

function saveData(){

localStorage.setItem(
"tasks",
JSON.stringify(tasks)
);

localStorage.setItem(
"memos",
JSON.stringify(memos)
);

localStorage.setItem(
"histories",
JSON.stringify(histories)
);

}

function createId(){

return Date.now().toString(36)
+Math.random().toString(36).slice(2);

}

function addTask(){

const text=
document.getElementById("taskInput")
.value
.trim();

const priority=
document.getElementById("priorityInput")
.value;

if(!text)return;

tasks.unshift({

id:createId(),
text,
priority,
done:false,
details:[],
emoji:
emojis[
Math.floor(
Math.random()*emojis.length
)
]

});

histories.unshift({

id:createId(),
date:new Date().toLocaleDateString(),
text

});

document.getElementById("taskInput").value="";

renderAll();

}

function addDetail(taskId){

const input=
document.getElementById(
`detail-input-${taskId}`
);

const value=input.value.trim();

if(!value)return;

const task=
tasks.find(t=>t.id===taskId);

task.details.push({

id:createId(),
text:value,
done:false

});

renderAll();

}

function toggleDetail(taskId,detailId){

const task=
tasks.find(t=>t.id===taskId);

const detail=
task.details.find(d=>d.id===detailId);

detail.done=!detail.done;

renderAll();

}

function renderTasks(){

const taskList=
document.getElementById("taskList");

const doneList=
document.getElementById("doneTaskList");

taskList.innerHTML="";
doneList.innerHTML="";

tasks.forEach(task=>{

const div=
document.createElement("div");

div.className=
`task ${task.done?"done":""}`;

div.innerHTML=`

<div style="display:flex;gap:12px;">

<input
type="checkbox"
class="task-check"
${task.done?"checked":""}
>

<div style="flex:1;">

<div style="
display:flex;
justify-content:space-between;
align-items:center;
gap:12px;
">

<div class="task-title">
${task.emoji} ${task.text}
</div>

<button class="delete-btn">
삭제
</button>

</div>

${task.done?`
<div class="done-badge">
완료됨
</div>
`:""}

<div class="badge ${task.priority}">
${task.priority==="high"
?"🔥 높음"
:task.priority==="medium"
?"✨ 보통"
:"☁️ 낮음"}
</div>

<div style="margin-top:14px;">

${task.details.map(detail=>`

<div class="detail ${detail.done?"done":""}">

<label>

<input
type="checkbox"
${detail.done?"checked":""}
onchange="
toggleDetail(
'${task.id}',
'${detail.id}'
)
">

${detail.text}

</label>

</div>

`).join("")}

</div>

${
!task.done
?`

<div class="detail-input-wrap">

<input
id="detail-input-${task.id}"
placeholder="상세 업무 추가..."
>

<button
class="add-btn"
onclick="addDetail('${task.id}')">

추가

</button>

</div>

`
:""
}

</div>

</div>

`;

div
.querySelector(".task-check")
.addEventListener("change",()=>{

task.done=!task.done;

renderAll();

});

div
.querySelector(".delete-btn")
.addEventListener("click",()=>{

tasks=
tasks.filter(
t=>t.id!==task.id
);

renderAll();

});

if(task.done){

doneList.appendChild(div);

}else{

taskList.appendChild(div);

}

});

}

function renderTop3(){

const wrap=
document.getElementById("top3");

wrap.innerHTML="";

const active=
tasks
.filter(
t=>
!t.done &&
t.priority==="high"
)
.slice(0,3);

active.forEach((task,index)=>{

let cls="top1";

if(index===1)cls="top2";
if(index===2)cls="top3c";

wrap.innerHTML+=`

<div class="top-card ${cls}">

<div class="top-rank">
TOP ${index+1}
</div>

<div class="top-task">
${task.text}
</div>

</div>

`;

});

}

function updateProgress(){

let total=0;
let done=0;

tasks.forEach(task=>{

total++;

if(task.done)done++;

task.details.forEach(detail=>{

total++;

if(detail.done)done++;

});

});

const percent=
total===0
?0
:Math.round((done/total)*100);

document.getElementById("percent")
.innerText=
percent+"%";

document.getElementById("progressFill")
.style.width=
percent+"%";

}

function addMemo(){

const type=
document.getElementById("memoType")
.value;

const title=
document.getElementById("memoTitle")
.value
.trim();

const text=
document.getElementById("memoText")
.value
.trim();

if(!title || !text)return;

memos.unshift({

id:createId(),
type,
title,
text

});

document.getElementById("memoTitle").value="";
document.getElementById("memoText").value="";

renderAll();

}

function renderMemos(){

const wrap=
document.getElementById("memoWrap");

wrap.innerHTML="";

memos.forEach(m=>{

const div=
document.createElement("div");

div.className="memo";

div.innerHTML=`

<button class="memo-delete">
✕
</button>

<div class="memo-type">
${m.type}
</div>

<input
class="memo-edit memo-title"
value="${m.title}"
>

<textarea
class="memo-edit memo-text"
rows="5">${m.text}</textarea>

`;

div
.querySelector(".memo-delete")
.addEventListener("click",()=>{

memos=
memos.filter(
memo=>memo.id!==m.id
);

renderAll();

});

div
.querySelector(".memo-title")
.addEventListener("input",(e)=>{

m.title=e.target.value;

saveData();

});

div
.querySelector(".memo-text")
.addEventListener("input",(e)=>{

m.text=e.target.value;

saveData();

});

wrap.appendChild(div);

});

}

function openHistory(){

document.getElementById(
"historyModal"
).style.display="flex";

renderHistory();

}

function closeHistory(){

document.getElementById(
"historyModal"
).style.display="none";

}

function renderHistory(){

const body=
document.getElementById("historyBody");

body.innerHTML="";

histories.forEach(h=>{

body.innerHTML+=`

<div class="history-item">

<div>
📅 ${h.date}
- ${h.text}
</div>

<button
class="delete-btn"
onclick="deleteHistory('${h.id}')">

삭제

</button>

</div>

`;

});

}

function deleteHistory(id){

histories=
histories.filter(
h=>h.id!==id
);

renderHistory();

saveData();

}

function renderAll(){

renderTasks();

renderTop3();

renderMemos();

updateProgress();

saveData();

}

renderAll();

</script>

</body>
</html>
