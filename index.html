```html
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>슈냥의 슬기로운 회사생활</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  font-family:'Pretendard',sans-serif;

  background:
    radial-gradient(circle at top left,#ffe8f3 0%,transparent 25%),
    radial-gradient(circle at bottom right,#dff5ff 0%,transparent 25%),
    #f7f8fc;

  padding:30px;

  color:#222;

  min-height:100vh;
}

.container{
  max-width:1700px;
  margin:auto;
}

.top-section{

  display:flex;
  justify-content:space-between;
  align-items:flex-start;

  gap:24px;

  flex-wrap:wrap;

  margin-bottom:28px;
}

.title-box h1{

  font-size:52px;
  line-height:1.3;
}

.title-box p{

  margin-top:14px;

  color:#777;
}

.top-right{

  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.card{

  background:white;

  border-radius:32px;

  padding:24px;

  box-shadow:
    0 10px 30px rgba(0,0,0,0.06);
}

.mind-card{
  width:420px;
}

.mind-title{

  font-size:18px;
  font-weight:700;

  color:#ff72ac;

  margin-bottom:16px;
}

.quote{

  background:#fff5fa;

  border-radius:20px;

  padding:18px;

  line-height:1.8;

  margin-bottom:16px;

  font-size:14px;
}

.quote strong{
  color:#ff72ac;
}

textarea{

  width:100%;

  border:none;
  outline:none;

  resize:none;

  background:#f6f7fb;

  border-radius:18px;

  padding:16px;

  font-size:14px;

  font-family:'Pretendard',sans-serif;
}

.mind-input{
  min-height:110px;
}

.progress-card{
  width:320px;
}

.progress-top{

  display:flex;
  justify-content:space-between;

  margin-bottom:16px;
}

.percent{

  font-size:34px;
  font-weight:700;
}

.progress-bar{

  width:100%;
  height:16px;

  background:#ececec;

  border-radius:999px;

  overflow:hidden;
}

.progress-fill{

  width:0%;

  height:100%;

  background:
    linear-gradient(90deg,#ffb5d6,#ffd89e);

  border-radius:999px;

  transition:0.3s;
}

.main{

  display:grid;

  grid-template-columns:1.1fr 0.9fr;

  gap:24px;
}

.board{

  background:white;

  border-radius:36px;

  padding:28px;

  box-shadow:
    0 10px 30px rgba(0,0,0,0.06);
}

.board-header{

  display:flex;
  justify-content:space-between;
  align-items:center;

  margin-bottom:24px;
}

.board-title{

  font-size:30px;
  font-weight:700;
}

.history-btn{

  border:none;

  background:#222;

  color:white;

  border-radius:16px;

  padding:12px 16px;

  cursor:pointer;

  font-weight:600;
}

.top3{

  display:grid;

  grid-template-columns:1fr 1fr 1fr;

  gap:14px;

  margin-bottom:24px;
}

.top-card{

  border-radius:24px;

  padding:20px;

  color:white;
}

.top1{
  background:linear-gradient(135deg,#ff7eb6,#ffb199);
}

.top2{
  background:linear-gradient(135deg,#b490ff,#f5b6ff);
}

.top3c{
  background:linear-gradient(135deg,#65d6c4,#8fc8ff);
}

.top-label{

  font-size:12px;

  opacity:0.8;

  margin-bottom:10px;
}

.top-text{

  font-size:15px;
  font-weight:700;

  line-height:1.6;
}

.input-wrap{

  display:flex;

  gap:12px;

  margin-bottom:24px;

  flex-wrap:wrap;
}

input,
select{

  border:none;
  outline:none;

  background:#f6f7fb;

  border-radius:18px;

  padding:16px;

  font-size:14px;
}

.task-input{
  flex:1;
}

button{

  border:none;

  background:#222;

  color:white;

  border-radius:18px;

  padding:0 20px;

  cursor:pointer;

  font-weight:600;
}

.task-list{

  display:flex;
  flex-direction:column;

  gap:18px;
}

.task{

  background:#fff;

  border-radius:28px;

  padding:22px;

  box-shadow:
    0 6px 20px rgba(0,0,0,0.05);

  transition:0.2s;
}

.task.done{
  opacity:0.55;
}

.task-title{

  font-size:18px;
  font-weight:700;

  margin-bottom:12px;
}

.task.done .task-title{
  text-decoration:line-through;
}

.badge{

  display:inline-block;

  padding:8px 12px;

  border-radius:999px;

  font-size:12px;
  font-weight:700;

  margin-bottom:14px;
}

.high{
  background:#ffe3e3;
  color:#ff4a4a;
}

.medium{
  background:#fff1cf;
  color:#ff9800;
}

.low{
  background:#e4f3ff;
  color:#479dd6;
}

.detail-list{

  display:flex;
  flex-direction:column;

  gap:10px;

  margin-top:14px;
}

.detail{

  background:#f7f7f7;

  border-radius:16px;

  padding:12px;
}

.detail.done{

  opacity:0.5;

  text-decoration:line-through;
}

.detail-input-wrap{

  display:flex;

  gap:10px;

  margin-top:16px;
}

.memo-wrap{

  display:flex;
  flex-wrap:wrap;

  gap:18px;
}

.memo{

  width:220px;

  min-height:220px;

  padding:18px;

  border-radius:30px;

  box-shadow:
    0 8px 20px rgba(0,0,0,0.08);
}

.memo-yellow{
  background:#fff2b7;
}

.memo-pink{
  background:#ffdce8;
}

.memo-blue{
  background:#dff3ff;
}

.memo-title{

  font-size:16px;
  font-weight:700;

  margin-bottom:12px;
}

.memo-text{

  white-space:pre-wrap;

  line-height:1.7;

  font-size:14px;
}

.modal{

  position:fixed;

  inset:0;

  background:
    rgba(0,0,0,0.45);

  display:none;

  justify-content:center;
  align-items:center;

  z-index:999;
}

.modal-content{

  width:90%;
  max-width:900px;

  max-height:85vh;

  overflow:auto;

  background:white;

  border-radius:30px;

  padding:28px;
}

.history-item{

  padding:14px 0;

  border-bottom:1px solid #eee;

  line-height:1.8;
}

@media(max-width:1300px){

  .main{
    grid-template-columns:1fr;
  }

  .top3{
    grid-template-columns:1fr;
  }

}

</style>
</head>

<body>

<div class="modal" id="historyModal">

  <div class="modal-content">

    <h2 style="margin-bottom:20px;">
      📚 업무 히스토리
    </h2>

    <div id="historyBody"></div>

    <br>

    <button onclick="closeHistory()">
      닫기
    </button>

  </div>

</div>

<div class="container">

  <div class="top-section">

    <div class="title-box">

      <h1>
        슈냥의<br>
        슬기로운 회사생활
      </h1>

      <p>
        오늘도 차근차근 해내는 중 ✨
      </p>

    </div>

    <div class="top-right">

      <div class="card mind-card">

        <div class="mind-title">
          🌷 오늘의 다짐
        </div>

        <div class="quote">

          <strong>
            “완벽하려고 멈추는 것보다,
          </strong>

          <br>

          일단 끝내는 사람이 결국 앞으로 간다.”

        </div>

        <textarea
          class="mind-input"
          placeholder="오늘의 다짐 적기 ✨"
        ></textarea>

      </div>

      <div class="card progress-card">

        <div class="progress-top">

          <div>
            오늘의 진행률
          </div>

          <div
            class="percent"
            id="percent">
            0%
          </div>

        </div>

        <div class="progress-bar">

          <div
            class="progress-fill"
            id="progressFill">
          </div>

        </div>

      </div>

    </div>

  </div>

  <div class="main">

    <div class="board">

      <div class="board-header">

        <div class="board-title">
          💼 오늘의 업무
        </div>

        <button
          class="history-btn"
          onclick="openHistory()">

          📚 히스토리

        </button>

      </div>

      <div
        class="top3"
        id="top3">
      </div>

      <div class="input-wrap">

        <input
          type="text"
          id="taskInput"
          class="task-input"
          placeholder="오늘 해야 할 업무 입력..."
        >

        <select id="priorityInput">

          <option value="high">
            🔥 높음
          </option>

          <option value="medium">
            ✨ 보통
          </option>

          <option value="low">
            ☁️ 낮음
          </option>

        </select>

        <button onclick="addTask()">
          추가
        </button>

      </div>

      <div
        class="task-list"
        id="taskList">
      </div>

    </div>

    <div class="board">

      <div class="board-title" style="margin-bottom:20px;">
        💌 사업소 요청 리스트
      </div>

      <div class="input-wrap">

        <select id="memoType">

          <option>
            💬 카톡
          </option>

          <option>
            ☎️ 전화
          </option>

        </select>

        <input
          type="text"
          id="memoTitle"
          placeholder="사업소명 / 제목"
        >

      </div>

      <textarea
        id="memoText"
        placeholder="요청 내용 정리..."
      ></textarea>

      <br><br>

      <button onclick="addMemo()">
        포스트잇 붙이기 ✨
      </button>

      <br><br>

      <div
        class="memo-wrap"
        id="memoWrap">
      </div>

    </div>

  </div>

</div>

<script>

const emojis = [
  "🌷","🎀","✨","💖","🩷","🍓"
];

const memoColors = [
  "memo-yellow",
  "memo-pink",
  "memo-blue"
];

let tasks =
  JSON.parse(localStorage.getItem("tasks")) || [];

let memos =
  JSON.parse(localStorage.getItem("memos")) || [];

let histories =
  JSON.parse(localStorage.getItem("histories")) || [];

function save(){

  localStorage.setItem(
    "tasks",
    JSON.stringify(tasks)
  );

  localStorage.setItem(
    "memos",
    JSON.stringify(memos)
  );

  localStorage.setItem(
    "histories",
    JSON.stringify(histories)
  );

}

function addTask(){

  const text =
    document.getElementById("taskInput").value.trim();

  const priority =
    document.getElementById("priorityInput").value;

  if(!text) return;

  tasks.push({

    id:Date.now(),
    text,
    priority,
    done:false,
    emoji:
      emojis[
        Math.floor(
          Math.random()*emojis.length
        )
      ],
    details:[]

  });

  histories.unshift({

    date:new Date().toLocaleDateString(),
    type:"업무추가",
    text

  });

  document.getElementById("taskInput").value="";

  save();

  renderTasks();

}

document
.getElementById("taskInput")
.addEventListener("keypress",e=>{

  if(e.key==="Enter"){
    addTask();
  }

});

function renderTasks(){

  const list =
    document.getElementById("taskList");

  list.innerHTML="";

  const sorted =
    [...tasks]
    .sort((a,b)=>a.done - b.done);

  sorted.forEach(task=>{

    const div =
      document.createElement("div");

    div.className =
      `task ${task.done ? "done" : ""}`;

    let badgeClass="low";

    if(task.priority==="high"){
      badgeClass="high";
    }

    if(task.priority==="medium"){
      badgeClass="medium";
    }

    div.innerHTML = `

      <div style="
        display:flex;
        gap:12px;
      ">

        <input
          type="checkbox"
          class="task-check"
          ${task.done ? "checked" : ""}
        >

        <div style="flex:1;">

          <div class="task-title">

            ${task.emoji}
            ${task.text}

          </div>

          <div class="badge ${badgeClass}">

            ${task.priority}

          </div>

        </div>

      </div>

    `;

    div
    .querySelector(".task-check")
    .addEventListener("change",()=>{

      task.done=!task.done;

      save();

      renderTasks();

    });

    list.appendChild(div);

  });

  renderTop3();

  updateProgress();

}

function renderTop3(){

  const wrap =
    document.getElementById("top3");

  wrap.innerHTML="";

  const order = {

    high:3,
    medium:2,
    low:1

  };

  const top =
    [...tasks]

    .filter(t=>!t.done)

    .sort((a,b)=>
      order[b.priority]
      -
      order[a.priority]
    )

    .slice(0,3);

  if(top.length===0){

    wrap.innerHTML = `

      <div class="top-card top1">
        <div class="top-label">TOP 1</div>
        <div class="top-text">
          🌷 아직 등록된 업무가 없어요
        </div>
      </div>

      <div class="top-card top2">
        <div class="top-label">TOP 2</div>
        <div class="top-text">
          ✨ 오늘 업무를 추가해보세요
        </div>
      </div>

      <div class="top-card top3c">
        <div class="top-label">TOP 3</div>
        <div class="top-text">
          💖 슈냥 오늘도 화이팅
        </div>
      </div>

    `;

    return;

  }

  top.forEach((task,index)=>{

    let cls="top1";

    if(index===1) cls="top2";
    if(index===2) cls="top3c";

    wrap.innerHTML += `

      <div class="top-card ${cls}">

        <div class="top-label">
          TOP ${index+1}
        </div>

        <div class="top-text">

          ${task.emoji}
          ${task.text}

        </div>

      </div>

    `;

  });

}

function updateProgress(){

  const total = tasks.length;

  const done =
    tasks.filter(t=>t.done).length;

  const percent =
    total===0
    ? 0
    : Math.round((done/total)*100);

  document.getElementById("percent")
    .innerText = percent+"%";

  document.getElementById("progressFill")
    .style.width = percent+"%";

}

function addMemo(){

  const type =
    document.getElementById("memoType").value;

  const title =
    document.getElementById("memoTitle").value;

  const text =
    document.getElementById("memoText").value;

  if(!title || !text) return;

  const color =
    memoColors[
      Math.floor(
        Math.random()*memoColors.length
      )
    ];

  memos.unshift({

    type,
    title,
    text,
    color

  });

  save();

  renderMemos();

}

function renderMemos(){

  const wrap =
    document.getElementById("memoWrap");

  wrap.innerHTML="";

  memos.forEach(m=>{

    wrap.innerHTML += `

      <div class="
        memo
        ${m.color}
      ">

        <div class="memo-title">

          ${m.type}
          ${m.title}

        </div>

        <div class="memo-text">

${m.text}

        </div>

      </div>

    `;

  });

}

function openHistory(){

  document.getElementById(
    "historyModal"
  ).style.display="flex";

  renderHistory();

}

function closeHistory(){

  document.getElementById(
    "historyModal"
  ).style.display="none";

}

function renderHistory(){

  const body =
    document.getElementById("historyBody");

  body.innerHTML="";

  histories.forEach(h=>{

    body.innerHTML += `

      <div class="history-item">

        📅 ${h.date}<br>

        ✨ ${h.type}
        - ${h.text}

      </div>

    `;

  });

}

renderTasks();
renderMemos();

</script>

</body>
</html>
```
